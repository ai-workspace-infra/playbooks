# S3 凭证优先由 workflow 注入的 MIGRATION_S3_* 环境变量提供；
# 若未注入，则回退到 Vault K/V (路径: kv/CICD) 动态抓取。
vault_s3_secret_query: >-
  {{
    {
      'TF_STATE_BUCKET': lookup('ansible.builtin.env', 'MIGRATION_S3_BUCKET') | default('', true),
      'TF_STATE_ACCESS_KEY': lookup('ansible.builtin.env', 'MIGRATION_S3_ACCESS_KEY') | default('', true),
      'TF_STATE_SECRET_KEY': lookup('ansible.builtin.env', 'MIGRATION_S3_SECRET_KEY') | default('', true),
      'TF_STATE_REGION': lookup('ansible.builtin.env', 'MIGRATION_S3_REGION') | default('', true),
      'TF_STATE_ENDPOINT': lookup('ansible.builtin.env', 'MIGRATION_S3_ENDPOINT') | default('', true)
    }
    if (lookup('ansible.builtin.env', 'MIGRATION_S3_BUCKET') | default('', true) | length > 0)
    else lookup('community.hashi_vault.vault_kv2_get',
      'CICD',
      engine_mount_point='kv',
      url='https://vault.svc.plus',
      auth_method='jwt' if lookup('ansible.builtin.env', 'VAULT_JWT_TOKEN') else 'token',
      jwt=lookup('ansible.builtin.env', 'VAULT_JWT_TOKEN') | default(omit, true),
      token=lookup('ansible.builtin.env', 'VAULT_TOKEN') | default(omit, true)
    ).secret
  }}

migration_s3_bucket: "{{ vault_s3_secret_query.TF_STATE_BUCKET }}"
migration_s3_access_key: "{{ vault_s3_secret_query.TF_STATE_ACCESS_KEY }}"
migration_s3_secret_key: "{{ vault_s3_secret_query.TF_STATE_SECRET_KEY }}"
migration_s3_region: "{{ vault_s3_secret_query.TF_STATE_REGION }}"
migration_s3_endpoint: "{{ vault_s3_secret_query.TF_STATE_ENDPOINT | regex_replace('^https?://', '') }}"

gitea_s3_bucket: "{{ vault_s3_secret_query.TF_STATE_BUCKET }}"
gitea_s3_access_key: "{{ vault_s3_secret_query.TF_STATE_ACCESS_KEY }}"
gitea_s3_secret_key: "{{ vault_s3_secret_query.TF_STATE_SECRET_KEY }}"
gitea_s3_region: "{{ vault_s3_secret_query.TF_STATE_REGION }}"
gitea_s3_endpoint: "{{ vault_s3_secret_query.TF_STATE_ENDPOINT | regex_replace('^https?://', '') }}"
