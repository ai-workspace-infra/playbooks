---
- name: Sync Obsidian Vault from macOS Documents to Google Drive
  hosts: localhost
  connection: local
  become: no
  gather_facts: true
  tasks:
    - name: Run macos_migration Google Drive sync tasks
      ansible.builtin.include_role:
        name: roles/vhosts/macos_migration
        tasks_from: google_drive_sync.yml
