---
CANONICAL_DOMAIN: console.xworkmate.com
SERVED_DOMAINS: console.xworkmate.com console.svc.plus
console_service_proxy_sites:
  - domain: console.xworkmate.com
    upstream: 127.0.0.1:3000
  - domain: console.svc.plus
    upstream: 127.0.0.1:3000
console_service_redirect_rules:
  - source: www.xworkmate.com
    target: console.xworkmate.com
  - source: xworkmate.com
    target: console.xworkmate.com
  - source: www.svc.plus
    target: console.svc.plus
  - source: svc.plus
    target: console.svc.plus
accounts_service_frontend_url: https://console.xworkmate.com
accounts_service_allowed_origins:
  - https://www.svc.plus
  - https://svc.plus
  - https://www.xworkmate.com
  - https://xworkmate.com
  - https://accounts.svc.plus
  - https://console.svc.plus
  - https://console.xworkmate.com
