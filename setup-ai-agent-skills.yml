---
- name: Setup AI agent skills
  hosts: all
  become: true
  gather_facts: true
  module_defaults:
    ansible.builtin.apt:
      lock_timeout: "{{ ai_workspace_apt_lock_timeout | default(900) | int }}"
  roles:
    - role: roles/ai_agent_runtime/
      when: ai_agent_runtime_enabled | default(true) | bool
      tags: [ai_agent_runtime]
