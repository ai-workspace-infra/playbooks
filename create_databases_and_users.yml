---
# =============================================================================
# 自动化建库/建用户任务 (PostgreSQL 逻辑隔离)
# 确保每个服务仅拥有自己独立库的独立账户，不越界使用 postgres 账号。
# =============================================================================

- name: Provision Dedicated PostgreSQL Databases and Users
  hosts: all
  become: yes
  vars:
    # If neither is set via environment, we'll auto-detect
    postgresql_deploy_mode: "{{ lookup('env', 'POSTGRESQL_DEPLOY_MODE') | default('native', true) }}"
    postgresql_deploy_mode_effective: >-
      {{ 'native' if (lookup('env', 'POSTGRESQL_DEPLOY_MODE') | default('native', true)) == 'standalone'
         else (lookup('env', 'POSTGRESQL_DEPLOY_MODE') | default('native', true)) }}
    pg_container_default: "postgresql"
    pg_root_host: "{{ lookup('env', 'POSTGRESQL_HOST') | default('127.0.0.1', true) }}"
    pg_root_port: "{{ lookup('env', 'POSTGRESQL_PORT') | default('5432', true) }}"
    pg_root_user: "{{ lookup('env', 'POSTGRESQL_ADMIN_USER') | default('postgres', true) }}"
    # 若配置了密码，可通过环境变量传入，或从本地密码影子文件读取
    pg_root_password: "{{ lookup('env', 'POSTGRESQL_ADMIN_PASSWORD') | default(lookup('env', 'POSTGRES_PASSWORD') | default(lookup('file', '/root/.ai_workspace_postgres_password', errors='ignore') | default('postgres', true), true), true) }}"

    vault_env_path: "{{ lookup('env', 'VAULT_ENV_PATH') | default('uat', true) }}"
    vault_deploy_mode: "{{ lookup('env', 'VAULT_DEPLOY_MODE') | default('standalone', true) }}"
    vault_addr: "{{ lookup('env', 'VAULT_ADDR') | default(('http://127.0.0.1:8200' if vault_deploy_mode != 'external' else 'https://vault.svc.plus'), true) }}"
    vault_token: "{{ lookup('env', 'VAULT_SERVER_ROOT_ACCESS_TOKEN') | default(lookup('env', 'VAULT_TOKEN'), true) }}"
    vault_pg_shadow_file: >-
      {{ (ansible_env.HOME ~ '/.ai_workspace_vault_pg_password')
         if ansible_os_family == 'Darwin'
         else '/root/.ai_workspace_vault_pg_password' }}

    # 业务数据库清单与对应专有用户 (Passwords resolved in pre_tasks)
    db_configs_raw:
      - db: account
        user: account_user
        env_var: 'ACCOUNT_PG_PASSWORD'
        vault_key: 'account_pg_password'
      - db: litellm
        user: litellm_user
        env_var: 'LITELLM_PG_PASSWORD'
        vault_key: 'litellm_pg_password'
      - db: rag
        user: rag_user
        env_var: 'RAG_PG_PASSWORD'
        vault_key: 'rag_pg_password'
      - db: zitadel
        user: zitadel_user
        env_var: 'ZITADEL_PG_PASSWORD'
        vault_key: 'zitadel_pg_password'
      - db: gitea
        user: gitea_user
        env_var: 'GITEA_PG_PASSWORD'
        vault_key: 'gitea_pg_password'
      - db: vault_storage
        user: vault_storage
        env_var: 'VAULT_PG_PASSWORD'
        vault_key: 'vault_pg_password'
      - db: billing
        user: billing_user
        env_var: 'BILLING_PG_PASSWORD'
        vault_key: 'billing_pg_password'

  pre_tasks:
    - name: Try to read existing databases secrets from Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_addr }}"
        auth_method: token
        token: "{{ vault_token }}"
        path: "kv/data/{{ vault_env_path }}/databases"
        engine_mount_point: "kv"
      register: existing_vault_db_secrets
      failed_when: false
      when: vault_token | length > 0

    - name: Resolve database passwords (Env > Vault > Auto-generate)
      ansible.builtin.set_fact:
        resolved_db_configs: >-
          {%- set results = [] -%}
          {%- set existing_secrets = existing_vault_db_secrets.secret | default({}) -%}
          {%- for db in db_configs_raw -%}
            {%- set env_pw = lookup('env', db.env_var) -%}
            {%- set vault_pw = existing_secrets.get(db.vault_key, '') -%}
            {%- if env_pw -%}
              {%- set final_pw = env_pw -%}
            {%- elif vault_pw -%}
              {%- set final_pw = vault_pw -%}
            {%- else -%}
              {%- set final_pw = lookup('password', '/dev/null length=16 chars=ascii_letters,digits') -%}
            {%- endif -%}
            {%- set _ = results.append({'db': db.db, 'user': db.user, 'password': final_pw, 'vault_key': db.vault_key}) -%}
          {%- endfor -%}
          {{ results }}

    - name: Export passwords as top-level facts
      ansible.builtin.set_fact:
        "{{ item.vault_key }}": "{{ item.password }}"
      loop: "{{ resolved_db_configs }}"
      no_log: true

    - name: Persist vault_pg_password to shadow file (read by setup-vault.yaml)
      ansible.builtin.copy:
        dest: "{{ vault_pg_shadow_file }}"
        content: "{{ vault_pg_password }}"
        mode: "0600"
      no_log: true
      when:
        - vault_pg_password is defined
        - vault_pg_password | length > 0

    # 探测无条件执行。此前两个探测各自被 postgresql_deploy_mode_effective 门控,
    # 而该变量在未显式传入 POSTGRESQL_DEPLOY_MODE 时默认 'native' —— 于是容器探测
    # 被跳过、宿主机又没有 psql, 条件块整体为假, 13 个任务全部 skipped、failed=0、
    # 步骤报绿, 而一个库都没有建。
    - name: Detect running Postgres container
      ansible.builtin.shell: "docker ps --format '{{ '{{' }}.Names{{ '}}' }}' | grep -E '^(postgresql|postgresql-svc-plus|ai-workspace-postgres)$' | head -n 1"
      register: detected_pg
      changed_when: false
      failed_when: false

    - name: Check if psql is available on the host
      ansible.builtin.command: which psql
      register: psql_check
      failed_when: false
      changed_when: false

    # 显式传入的 POSTGRESQL_DEPLOY_MODE 优先; 否则按实际探测结果判定。
    - name: Resolve effective PostgreSQL topology
      ansible.builtin.set_fact:
        pg_topology: >-
          {{ 'compose' if (lookup('env', 'POSTGRESQL_DEPLOY_MODE') == 'compose'
                           or (detected_pg.stdout | default('') | trim) != '')
             else ('native' if (psql_check.rc | default(-1)) == 0 else 'none') }}
        pg_container: "{{ (detected_pg.stdout | default('') | trim) or pg_container_default }}"

    # 探测不到可用 PostgreSQL 时必须失败。跳过会让建库整体静默不执行, 而后续
    # 依赖这些库的步骤(如 Vault storage schema)才在很远处报 "database ... does
    # not exist" —— 真正的原因已经被甩在几步之外。
    - name: Fail when no reachable PostgreSQL was found
      ansible.builtin.fail:
        msg: >-
          No reachable PostgreSQL: neither a running container
          (postgresql / postgresql-svc-plus / ai-workspace-postgres) nor a host psql
          binary was found. These databases would have been silently skipped:
          {{ resolved_db_configs | map(attribute='db') | join(', ') }}
      when: pg_topology == 'none'


    - name: Conditional DB creation block
      when: pg_topology in ['compose', 'native']
      block:
      - name: Create dedicated users
        ansible.builtin.command: >
          docker exec -i {{ pg_container }} psql -U {{ pg_root_user }} -tAc
          "SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = '{{ item.user }}'"
        loop: "{{ resolved_db_configs }}"
        register: user_check_results
        changed_when: false
        failed_when: false
        when: pg_topology == 'compose'
  
      - name: Create dedicated users via PostgreSQL TCP
        ansible.builtin.command: >
          psql -h {{ pg_root_host }} -p {{ pg_root_port }} -U {{ pg_root_user }} -d postgres -tAc
          "SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = '{{ item.user }}'"
        loop: "{{ resolved_db_configs }}"
        # 不能与 compose 分支共用 register 名: 被 skip 的任务同样会写 register,
        # 会把已运行分支的结果覆盖成没有 stdout 的 skip 字典
        register: user_check_results_tcp
        changed_when: false
        failed_when: false
        environment:
          PGPASSWORD: "{{ pg_root_password }}"
        when: pg_topology != 'compose'
  
      - name: Execute CREATE ROLE if not exists
        ansible.builtin.command: >
          docker exec -i {{ pg_container }} psql -U {{ pg_root_user }} -c
          "CREATE ROLE {{ item.item.user }} LOGIN PASSWORD '{{ item.item.password }}';"
        loop: "{{ user_check_results.results }}"
        register: create_user_results
        changed_when: true
        when:
          - pg_topology == 'compose'
          - (item.stdout | default('')) | trim != '1'
        no_log: true
  
      - name: Execute CREATE ROLE if not exists via PostgreSQL TCP
        ansible.builtin.command:
          cmd: >-
            psql -h {{ pg_root_host }} -p {{ pg_root_port }}
            -U {{ pg_root_user }} -d postgres
            -c "CREATE ROLE {{ item.item.user }} LOGIN PASSWORD '{{ item.item.password }}';"
        environment:
          PGPASSWORD: "{{ pg_root_password }}"
        loop: "{{ user_check_results_tcp.results }}"
        register: create_user_results_tcp
        changed_when: true
        when:
          - pg_topology != 'compose'
          - (item.stdout | default('')) | trim != '1'
        no_log: true

      # 角色若已存在 (例如 postgres 数据卷跨 run 存活下来), 上面的 CREATE ROLE
      # 会被跳过, 密码永远停留在这个角色第一次被创建时的值, 与
      # resolved_db_configs (Env > Vault > 自动生成解析出的当前值) 脱节, 导致
      # 应用侧连接密码认证失败。这里对已存在的角色显式收敛一次密码。
      - name: Reconcile password for pre-existing roles
        ansible.builtin.command: >
          docker exec -i {{ pg_container }} psql -U {{ pg_root_user }} -c
          "ALTER ROLE {{ item.item.user }} PASSWORD '{{ item.item.password }}';"
        loop: "{{ user_check_results.results }}"
        register: sync_password_results
        changed_when: true
        when:
          - pg_topology == 'compose'
          - (item.stdout | default('')) | trim == '1'
        no_log: true

      - name: Reconcile password for pre-existing roles via PostgreSQL TCP
        ansible.builtin.command:
          cmd: >-
            psql -h {{ pg_root_host }} -p {{ pg_root_port }}
            -U {{ pg_root_user }} -d postgres
            -c "ALTER ROLE {{ item.item.user }} PASSWORD '{{ item.item.password }}';"
        environment:
          PGPASSWORD: "{{ pg_root_password }}"
        loop: "{{ user_check_results_tcp.results }}"
        register: sync_password_results_tcp
        changed_when: true
        when:
          - pg_topology != 'compose'
          - (item.stdout | default('')) | trim == '1'
        no_log: true
  
      - name: Create dedicated databases and assign owners
        ansible.builtin.command: >
          docker exec -i {{ pg_container }} psql -U {{ pg_root_user }} -tc "SELECT 1 FROM pg_database WHERE datname = '{{ item.db }}'"
        loop: "{{ resolved_db_configs }}"
        register: db_check_results
        changed_when: false
        failed_when: false
        when: pg_topology == 'compose'
  
      - name: Create dedicated databases and assign owners via PostgreSQL TCP
        ansible.builtin.command: >
          psql -h {{ pg_root_host }} -p {{ pg_root_port }} -U {{ pg_root_user }} -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '{{ item.db }}'"
        loop: "{{ resolved_db_configs }}"
        register: db_check_results_tcp
        changed_when: false
        failed_when: false
        environment:
          PGPASSWORD: "{{ pg_root_password }}"
        when: pg_topology != 'compose'
  
      - name: Execute CREATE DATABASE if not exists
        ansible.builtin.command: >
          docker exec -i {{ pg_container }} psql -U {{ pg_root_user }} -c "CREATE DATABASE {{ item.item.db }} OWNER {{ item.item.user }} ENCODING 'UTF8';"
        loop: "{{ db_check_results.results }}"
        register: create_db_results
        changed_when: true
        when:
          - pg_topology == 'compose'
          - (item.stdout | default('')) | trim != '1'
  
      - name: Execute CREATE DATABASE if not exists via PostgreSQL TCP
        ansible.builtin.command: >
          psql -h {{ pg_root_host }} -p {{ pg_root_port }} -U {{ pg_root_user }} -d postgres -c "CREATE DATABASE {{ item.item.db }} OWNER {{ item.item.user }} ENCODING 'UTF8';"
        loop: "{{ db_check_results_tcp.results }}"
        register: create_db_results_tcp
        changed_when: true
        environment:
          PGPASSWORD: "{{ pg_root_password }}"
        when:
          - pg_topology != 'compose'
          - (item.stdout | default('')) | trim != '1'
  
