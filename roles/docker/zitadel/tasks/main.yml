---

- name: Try to read databases secrets from Vault for Zitadel
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_addr }}"
    auth_method: token
    token: "{{ vault_token }}"
    path: "kv/data/{{ lookup('env', 'VAULT_ENV_PATH') | default('uat', true) }}/databases"
    engine_mount_point: "kv"
  register: zitadel_existing_vault_db_secrets
  failed_when: false
  when: vault_token | length > 0

- name: Set Zitadel DB password fact
  ansible.builtin.set_fact:
    zitadel_db_password_fact: "{{ lookup('env', 'ZITADEL_PG_PASSWORD') | default(zitadel_existing_vault_db_secrets.secret.zitadel_pg_password | default('CHANGE_ME', true), true) }}"
- name: Read Zitadel admin password from Vault
  delegate_to: localhost
  become: false
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/kv/data/iam.svc.plus"
    headers:
      X-Vault-Token: "{{ vault_token }}"
    method: GET
  register: zitadel_vault_secret
  run_once: true
  check_mode: false
  no_log: true

- name: Set Zitadel admin password fact
  ansible.builtin.set_fact:
    zitadel_admin_password: "{{ zitadel_vault_secret.json.data.data['zitadel-admin@zitadel.iam.svc.plus'] }}"
  no_log: true

- name: Ensure Zitadel directories exist
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ zitadel_workspace }}"

- name: Ensure Zitadel workspace ownership
  become: true
  ansible.builtin.file:
    path: "{{ zitadel_workspace }}"
    state: directory
    recurse: true
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Template Zitadel configuration files
  become: true
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ zitadel_workspace }}/{{ item.dest }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - { src: 'docker-compose.yaml', dest: 'docker-compose.yaml' }

- name: Copy Zitadel static files
  become: true
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ zitadel_workspace }}/{{ item.dest }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - { src: 'run.sh', dest: 'run.sh', mode: '0755' }

- name: Check caddy CLI is present on the target node
  become: true
  ansible.builtin.command: caddy version
  changed_when: false

- name: Ensure Caddy fragment directory exists for Zitadel
  become: true
  ansible.builtin.file:
    path: "{{ zitadel_caddy_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Zitadel Caddy site fragment
  become: true
  ansible.builtin.template:
    src: zitadel-site.caddy.j2
    dest: "{{ zitadel_caddy_fragment_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload caddy

- name: Ensure Caddy is enabled and running for Zitadel
  become: true
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started

- name: Validate Caddy configuration for Zitadel
  become: true
  ansible.builtin.command: caddy validate --config "{{ zitadel_caddyfile_path }}"
  changed_when: false

