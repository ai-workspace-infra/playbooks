- name: Zitadel containers (cleanup)
  become: true
  shell: |
    docker compose -f {{ zitadel_workspace }}/docker-compose.yaml down || true
  args:
    chdir: "{{ zitadel_workspace }}"
  when: not zitadel_initialized.stat.exists


- name: Create Zitadel database via Docker
  ansible.builtin.shell: |
    docker exec postgresql-svc-plus psql -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='zitadel'" | grep -q 1 || \
    docker exec postgresql-svc-plus psql -U postgres -c "CREATE DATABASE zitadel OWNER zitadel ENCODING 'UTF8';"
  changed_when: false

