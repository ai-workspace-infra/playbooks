# 4. 启动正式 Zitadel stack（start-only）
# -------------------------------------------------------------------

- name: Try to read databases secrets from Vault for Zitadel
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_addr }}"
    auth_method: token
    token: "{{ vault_token }}"
    path: "kv/data/{{ lookup('env', 'VAULT_ENV_PATH') | default('uat', true) }}/databases"
    engine_mount_point: "kv"
  register: zitadel_existing_vault_db_secrets
  failed_when: false
  when: vault_token | length > 0

- name: Set Zitadel DB password fact
  ansible.builtin.set_fact:
    zitadel_db_password_fact: "{{ lookup('env', 'ZITADEL_PG_PASSWORD') | default(zitadel_existing_vault_db_secrets.secret.zitadel_pg_password | default('CHANGE_ME', true), true) }}"
- name: Bring up Zitadel stack
  become: true
  command: docker compose -f {{ zitadel_workspace }}/docker-compose.yaml up -d --remove-orphans
  args:
    chdir: "{{ zitadel_workspace }}"
