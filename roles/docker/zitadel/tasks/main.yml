- name: Run Zitadel init (one-time)
  become: true
  shell: |
    docker compose -f {{ zitadel_workspace }}/docker-compose.yaml run --rm zitadel-init || true
  args:
    chdir: "{{ zitadel_workspace }}"
  when: not zitadel_initialized.stat.exists

