---
# Provision the litellm database and user BEFORE litellm starts.
# Only runs when litellm_database_host is set.
# Debian/Ubuntu 显式走 apt：play 的 module_defaults.apt.lock_timeout(模板值)只有在
# apt 任务上才渲染；经 package 间接派发到 apt 时模板不渲染 → lock_timeout 收到字面
# "{{ ... }}" 报 int 转换失败（见 xworkmate_bridge 同类修复）。
- name: Install LiteLLM prerequisites (Debian/Ubuntu via apt)
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-psycopg2
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'

- name: Install LiteLLM prerequisites (non-Debian Linux)
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-psycopg2
    state: present
  when: ansible_os_family not in ['Darwin', 'Debian', 'Windows']

- name: Install LiteLLM prerequisites (macOS)
  # Use brew from PATH (Apple Silicon prefix first) instead of the
  # community.general.homebrew module, which can select a stale Intel Homebrew
  # at /usr/local that crashes on newer macOS versions. See postgres macos.yml.
  ansible.builtin.command: brew install python@3.13
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"
    HOMEBREW_NO_AUTO_UPDATE: "1"
  register: litellm_brew_python
  changed_when: >-
    'already installed' not in (litellm_brew_python.stderr | default(''))
    and 'already installed' not in (litellm_brew_python.stdout | default(''))
  failed_when: litellm_brew_python.rc != 0
  when: ansible_os_family == 'Darwin'

- name: Materialize persisted LiteLLM secrets
  ansible.builtin.assert:
    that:
      - litellm_salt_key | length > 0
      - litellm_database_password | length > 0
    fail_msg: "LiteLLM persisted secrets must not be empty."
  no_log: true

- name: Inspect persisted LiteLLM secrets
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ litellm_salt_key_file }}"
    - "{{ litellm_database_password_file }}"
  register: litellm_secret_files
  no_log: true

- name: Protect persisted LiteLLM secrets
  ansible.builtin.file:
    path: "{{ item.item }}"
    owner: root
    group: root
    mode: "0600"
    state: file
  loop: "{{ litellm_secret_files.results }}"
  when: item.stat.exists
  no_log: true

- name: Ensure litellm service group exists
  ansible.builtin.group:
    name: "{{ litellm_service_group }}"
    state: present
  when:
    - litellm_service_group != 'root'
    - ansible_os_family != 'Darwin'

- name: Ensure litellm service user exists
  ansible.builtin.user:
    name: "{{ litellm_service_user }}"
    group: "{{ litellm_service_group }}"
    shell: /bin/bash
    create_home: true
    state: present
  when:
    - litellm_service_user != 'root'
    - ansible_os_family != 'Darwin'

- name: Ensure litellm config directory exists
  ansible.builtin.file:
    path: "{{ litellm_config_dir }}"
    state: directory
    owner: "{{ litellm_service_user if ansible_os_family == 'Darwin' else 'root' }}"
    group: "{{ litellm_service_group if ansible_os_family == 'Darwin' else 'root' }}"
    mode: "0755"

- name: Provision LiteLLM Database
  ansible.builtin.import_tasks: provision-database.yml
  when: litellm_database_host | trim | length > 0

- name: Create litellm config template
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ litellm_config_file }}"
    owner: "{{ litellm_service_user }}"
    group: "{{ litellm_service_group }}"
    mode: "0644"
  notify: Restart litellm

- name: Create litellm environment file template
  ansible.builtin.template:
    src: litellm.env.j2
    dest: "{{ litellm_env_file }}"
    owner: "{{ litellm_service_user if ansible_os_family == 'Darwin' else 'root' }}"
    group: "{{ litellm_service_group if ansible_os_family == 'Darwin' else 'root' }}"
    mode: "0600"
  notify: Restart litellm

- name: Create isolated LiteLLM Python environment
  ansible.builtin.command:
    cmd: "{{ litellm_bootstrap_python_executable }} -m venv {{ litellm_venv_dir }}"
    creates: "{{ litellm_python_executable }}"
  become: true
  become_user: "{{ litellm_service_user }}"

# A venv bootstrapped by ensurepip can ship a pip older than 25.1, which lacks
# `--resume-retries`. Upgrade pip first so the resilient download flags used by
# the dependency install below are always available.
- name: Ensure recent pip in the LiteLLM environment
  ansible.builtin.pip:
    name: pip
    state: latest
    executable: "{{ litellm_pip_executable }}"
  environment:
    PIP_CACHE_DIR: "{{ litellm_pip_cache_dir }}"
    PIP_DEFAULT_TIMEOUT: "120"
  become: true
  become_user: "{{ litellm_service_user }}"

- name: Inspect installed LiteLLM dependency marker
  ansible.builtin.stat:
    path: "{{ litellm_install_marker_file }}"
  register: litellm_install_marker
  become: true
  become_user: "{{ litellm_service_user }}"

- name: Read installed LiteLLM dependency marker
  ansible.builtin.command:
    cmd: "cat {{ litellm_install_marker_file }}"
  register: litellm_install_marker_content
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ litellm_service_user }}"
  when: litellm_install_marker.stat.exists

# The probe must stay a valid single-line Python program: the `>-` folding
# collapses every newline into a space, so a `for ... : try: ... except:` block
# would become one illegal logical line, crash with SyntaxError, and (with
# failed_when:false) leave stdout empty -> the from_json below then explodes.
# Build the version map from importlib.metadata.distributions() with dict/list
# comprehensions, which are valid single statements joined by semicolons.
- name: Inspect installed LiteLLM dependency versions
  ansible.builtin.command:
    cmd: >-
      {{ litellm_python_executable }} -c
      "import importlib.metadata as m, json;
      dists = {d.metadata['Name'].lower(): d.version for d in m.distributions()};
      print(json.dumps({p: dists.get(p, 'missing') for p in ['litellm', 'prisma', 'psycopg2-binary']}))"
  register: litellm_dependency_versions
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ litellm_service_user }}"

- name: Decide whether LiteLLM dependencies need installation
  ansible.builtin.set_fact:
    # default('{}', true) also substitutes when stdout is an empty string (not
    # just undefined), so a failed/empty probe degrades to "install required"
    # instead of crashing from_json with "Expecting value: line 1 column 1".
    litellm_dependency_install_required: >-
      {{
        not litellm_install_marker.stat.exists
        or (litellm_install_marker_content.stdout | default('') | trim != litellm_package_spec)
        or (litellm_dependency_versions.stdout | default('{}', true) | from_json).litellm == 'missing'
        or (litellm_dependency_versions.stdout | default('{}', true) | from_json).prisma == 'missing'
        or (litellm_dependency_versions.stdout | default('{}', true) | from_json)['psycopg2-binary'] == 'missing'
      }}

- name: Ensure LiteLLM and DB dependencies are installed
  ansible.builtin.pip:
    name:
      - "{{ litellm_package_spec }}"
      - "prisma"
      - "psycopg2-binary"
    executable: "{{ litellm_pip_executable }}"
    state: present
    # litellm[proxy] pulls large wheels (e.g. polars-runtime ~46MB) that often
    # break mid-stream on slow/mirrored links with IncompleteRead. --retries
    # reconnects and --resume-retries continues a partial download instead of
    # restarting it, so a flaky connection no longer fails the whole deploy.
    extra_args: "--retries {{ litellm_pip_retries }} --resume-retries {{ litellm_pip_resume_retries }}"
  environment:
    PIP_CACHE_DIR: "{{ litellm_pip_cache_dir }}"
    PIP_DEFAULT_TIMEOUT: "{{ litellm_pip_timeout }}"
  become: true
  become_user: "{{ litellm_service_user }}"
  when: litellm_dependency_install_required | bool

- name: Record installed LiteLLM dependency spec
  ansible.builtin.copy:
    dest: "{{ litellm_install_marker_file }}"
    content: "{{ litellm_package_spec }}\n"
    owner: "{{ litellm_service_user }}"
    group: "{{ litellm_service_group }}"
    mode: "0644"
  become: true
  become_user: "{{ litellm_service_user }}"
  when: litellm_dependency_install_required | bool

- name: Resolve LiteLLM Python site-packages path
  ansible.builtin.command:
    cmd: >-
      {{ litellm_python_executable }} -c
      "import pathlib, litellm.proxy; print(pathlib.Path(litellm.proxy.__file__).parent)"
  register: litellm_proxy_package_path
  changed_when: false
  become: true
  become_user: "{{ litellm_service_user }}"

- name: Set LiteLLM Python paths
  ansible.builtin.set_fact:
    litellm_proxy_dir: "{{ litellm_proxy_package_path.stdout | trim }}"
    litellm_python_site_packages: "{{ (litellm_proxy_package_path.stdout | trim) | dirname | dirname }}"

- name: Generate Prisma Python Client
  ansible.builtin.command:
    cmd: "{{ litellm_prisma_binary_path }} generate"
  args:
    chdir: "{{ litellm_proxy_dir }}"
  # `prisma generate` shells out to the `prisma-client-py` generator, which is a
  # console script installed into the venv's bin dir. The default command PATH
  # does not include the venv, so the absolute prisma binary still fails with
  # "prisma-client-py: command not found". Put the venv bin dir on PATH so the
  # generator subprocess is resolvable.
  environment:
    PATH: "{{ litellm_venv_dir }}/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"
  become: true
  become_user: "{{ litellm_service_user }}"
  changed_when: false

- name: Create systemd service template
  ansible.builtin.template:
    src: litellm-proxy.service.j2
    dest: "{{ litellm_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart litellm
  when: ansible_os_family != 'Darwin'

- name: Reload systemd after unit changes
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - not ansible_check_mode
    - ansible_os_family != 'Darwin'

- name: Ensure Caddy fragment directory exists
  ansible.builtin.file:
    path: "{{ litellm_caddy_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - caddy_enabled | bool
    - litellm_caddy_config_enabled | bool
  become: true

- name: Generate bcrypt hash for LiteLLM UI basic auth
  ansible.builtin.command: caddy hash-password --plaintext "{{ litellm_master_key }}"
  register: caddy_hash_result
  changed_when: false
  no_log: true
  when: litellm_enable_basic_auth
  become: true

- name: Set litellm_basic_auth_password_hash fact
  ansible.builtin.set_fact:
    litellm_basic_auth_password_hash: "{{ caddy_hash_result.stdout }}"
  no_log: true
  when: litellm_enable_basic_auth
  become: true

- name: Ensure Caddy imports managed fragments
  ansible.builtin.lineinfile:
    path: "{{ litellm_caddyfile_path }}"
    regexp: "^import {{ litellm_caddy_conf_dir }}/\\*\\.caddy"
    line: "import {{ litellm_caddy_conf_dir }}/*.caddy"
    insertafter: EOF
    create: true
    owner: root
    group: root
    mode: "0644"
    state: present
  notify: Reload caddy
  when: litellm_caddy_config_enabled | bool
  become: true

- name: Create LiteLLM API Caddy fragment
  ansible.builtin.template:
    src: api.svc.plus.caddy.j2
    dest: "{{ litellm_api_caddy_fragment_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload caddy
  when: litellm_caddy_config_enabled | bool
  become: true

- name: Create LiteLLM UI Caddy fragment
  ansible.builtin.template:
    src: litellm.svc.plus.caddy.j2
    dest: "{{ litellm_ui_caddy_fragment_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload caddy
  when: litellm_caddy_config_enabled | bool
  become: true

- name: Remove LiteLLM public Caddy fragments when public access is disabled
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ litellm_api_caddy_fragment_path }}"
    - "{{ litellm_ui_caddy_fragment_path }}"
  notify: Reload caddy
  when: not (litellm_caddy_config_enabled | bool)
  become: true

- name: Ensure litellm service is enabled and running
  ansible.builtin.systemd:
    name: "{{ litellm_service_name }}"
    enabled: true
    state: started
  when:
    - not ansible_check_mode
    - ansible_os_family != 'Darwin'

- name: Import macOS specific service tasks
  ansible.builtin.import_tasks: macos.yml
  when: ansible_os_family == 'Darwin'

- name: Ensure Caddy is enabled and running
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
  when:
    - not ansible_check_mode
    - litellm_caddy_config_enabled | bool
    - ansible_os_family != 'Darwin'
  become: true

- name: Apply litellm and Caddy changes before validation
  ansible.builtin.meta: flush_handlers
  become: true

- name: Validate LiteLLM service
  ansible.builtin.uri:
    url: "http://{{ litellm_listen_host }}:{{ litellm_listen_port }}/health"
    method: GET
    status_code: [200, 401]
  register: litellm_health_check
  failed_when: false
  changed_when: false
  when: not ansible_check_mode

- name: Display LiteLLM health status
  ansible.builtin.debug:
    msg: "LiteLLM health check: {{ litellm_health_check.status | default('unreachable') }}"
- name: Create litellm environment file example
  ansible.builtin.template:
    src: litellm.env.example.j2
    dest: "{{ litellm_config_dir }}/litellm.env.example"
    owner: "{{ litellm_service_user }}"
    group: "{{ litellm_service_group }}"
    mode: "0600"

- name: Register mainstream models to LiteLLM
  ansible.builtin.script: files/register_mainstream_models.sh
  environment:
    LITELLM_URL: "http://{{ litellm_listen_host }}:{{ litellm_listen_port }}"
    LITELLM_TOKEN: "{{ litellm_master_key }}"
    DEEPSEEK_API_KEY: "{{ litellm_deepseek_api_key }}"
    OPENAI_API_KEY: "{{ litellm_openai_api_key }}"
    NVIDIA_API_KEY: "{{ litellm_nvidia_api_key }}"
    GEMINI_API_KEY: "{{ litellm_gemini_api_key }}"
    ANTHROPIC_API_KEY: "{{ litellm_anthropic_api_key }}"
    OLLAMA_API_KEY: "{{ litellm_ollama_api_key }}"
  when: >
    not ansible_check_mode and
    ((litellm_deepseek_api_key | length > 0) or
     (litellm_openai_api_key | length > 0) or
     (litellm_nvidia_api_key | length > 0) or
     (litellm_gemini_api_key | length > 0) or
     (litellm_anthropic_api_key | length > 0) or
     (litellm_ollama_api_key | length > 0))
  changed_when: false
