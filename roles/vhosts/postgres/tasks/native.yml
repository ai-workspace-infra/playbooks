- name: Ensure PostgreSQL repository prerequisites are installed
  ansible.builtin.apt:
    name: "{{ postgresql_package_dependencies | list }}"
    state: present
    update_cache: true
  when:
    - ansible_os_family == 'Debian'
    - ansible_distribution == 'Ubuntu'
    - ansible_distribution_version is version('22.04', '>=')
    - postgresql_use_official_repo | bool

- name: Download PostgreSQL repository signing key
  ansible.builtin.get_url:
    url: "{{ postgresql_repo_key_url }}"
    dest: "{{ postgresql_repo_key_path }}"
    mode: "0644"
  when:
    - ansible_os_family == 'Debian'
    - ansible_distribution == 'Ubuntu'
    - ansible_distribution_version is version('22.04', '>=')
    - postgresql_use_official_repo | bool

- name: Configure PostgreSQL apt repository
  ansible.builtin.apt_repository:
    repo: "{{ postgresql_repo }}"
    filename: postgresql
    state: present
  register: postgresql_repo_config
  when:
    - ansible_os_family == 'Debian'
    - ansible_distribution == 'Ubuntu'
    - ansible_distribution_version is version('22.04', '>=')
    - postgresql_use_official_repo | bool

- name: Refresh apt cache if repository was added
  ansible.builtin.apt:
    update_cache: true
  when:
    - ansible_os_family == 'Debian'
    - ansible_distribution == 'Ubuntu'
    - ansible_distribution_version is version('22.04', '>=')
    - postgresql_use_official_repo | bool
    - postgresql_repo_config is defined
    - postgresql_repo_config is changed

- name: Set package list for PostgreSQL
  ansible.builtin.set_fact:
    postgresql_packages: "{{ (postgresql_packages_base + postgresql_extra_packages) | unique | list }}"

- name: Install PostgreSQL packages
  ansible.builtin.apt:
    name: "{{ postgresql_packages | list }}"
    state: present
    update_cache: true
  when:
    - ansible_os_family == 'Debian'

- name: Ensure PostgreSQL service is enabled and started
  ansible.builtin.systemd:
    name: "{{ postgresql_service_name }}"
    enabled: true
    state: started

# Native install never sets a password for the postgres superuser (only
# peer-auth via the local unix socket works out of the box), but
# create_databases_and_users.yml authenticates over TCP with PGPASSWORD.
# Without this, every TCP-mode CREATE/ALTER ROLE call fails with
# "password authentication failed for user postgres".
- name: Set PostgreSQL admin (postgres) role password
  become: true
  become_user: postgres
  ansible.builtin.shell: |
    set -e
    psql -d postgres -v ON_ERROR_STOP=1 <<SQL
    ALTER ROLE "{{ postgresql_admin_user }}" PASSWORD '{{ postgresql_admin_password }}';
    SQL
  no_log: true
  changed_when: true
  when: postgresql_admin_password | length > 0

- name: Gather facts for PostgreSQL configuration files
  ansible.builtin.stat:
    path: "{{ postgresql_conf_path }}"
  register: postgresql_conf_file

- name: Discover PostgreSQL configuration file when default path is absent
  ansible.builtin.shell: |
    set -e
    find /etc/postgresql -path '*/main/postgresql.conf' -type f | sort -V | tail -n 1
  register: postgresql_conf_discovery
  changed_when: false
  when: not postgresql_conf_file.stat.exists

- name: Use discovered PostgreSQL configuration file
  ansible.builtin.set_fact:
    postgresql_conf_path: "{{ postgresql_conf_discovery.stdout | trim }}"
  when:
    - not postgresql_conf_file.stat.exists
    - postgresql_conf_discovery.stdout | trim | length > 0

- name: Refresh facts for PostgreSQL configuration file
  ansible.builtin.stat:
    path: "{{ postgresql_conf_path }}"
  register: postgresql_conf_file

- name: Configure listen_addresses in postgresql.conf
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_path }}"
    regexp: '^#?listen_addresses\s*='
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  when: postgresql_conf_file.stat.exists
  notify: Restart PostgreSQL

- name: Configure port in postgresql.conf
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_path }}"
    regexp: '^#?port\s*='
    line: "port = {{ postgresql_port }}"
  when: postgresql_conf_file.stat.exists
  notify: Restart PostgreSQL

- name: Configure password_encryption in postgresql.conf
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_path }}"
    regexp: '^#?password_encryption\s*='
    line: "password_encryption = '{{ postgresql_password_encryption }}'"
  when:
    - postgresql_conf_file.stat.exists
    - postgresql_password_encryption | length > 0
  notify: Restart PostgreSQL

- name: Ensure pg_hba.conf exists
  ansible.builtin.stat:
    path: "{{ postgresql_hba_path }}"
  register: postgresql_hba_file

- name: Discover PostgreSQL pg_hba.conf when default path is absent
  ansible.builtin.shell: |
    set -e
    find /etc/postgresql -path '*/main/pg_hba.conf' -type f | sort -V | tail -n 1
  register: postgresql_hba_discovery
  changed_when: false
  when: not postgresql_hba_file.stat.exists

- name: Use discovered PostgreSQL pg_hba.conf
  ansible.builtin.set_fact:
    postgresql_hba_path: "{{ postgresql_hba_discovery.stdout | trim }}"
  when:
    - not postgresql_hba_file.stat.exists
    - postgresql_hba_discovery.stdout | trim | length > 0

- name: Refresh facts for PostgreSQL pg_hba.conf
  ansible.builtin.stat:
    path: "{{ postgresql_hba_path }}"
  register: postgresql_hba_file

- name: Configure pg_hba.conf access rules
  ansible.builtin.blockinfile:
    path: "{{ postgresql_hba_path }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK FOR POSTGRESQL ACCESS"
    block: |-
      {% for network in postgresql_allowed_hosts %}
      host    all             all             {{ network }}        {{ postgresql_auth_method }}
      {% endfor %}
  when:
    - postgresql_hba_file.stat.exists
    - postgresql_allowed_hosts | length > 0
  notify: Restart PostgreSQL

- name: Remove managed pg_hba.conf block when no networks are defined
  ansible.builtin.blockinfile:
    path: "{{ postgresql_hba_path }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK FOR POSTGRESQL ACCESS"
    state: absent
  when:
    - postgresql_hba_file.stat.exists
    - postgresql_allowed_hosts | length == 0
