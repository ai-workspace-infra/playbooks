---
postgresql_deploy_mode: "{{ lookup('ansible.builtin.env', 'POSTGRESQL_DEPLOY_MODE') | default('native', true) }}"
postgresql_host: "{{ lookup('ansible.builtin.env', 'POSTGRESQL_HOST') | default('127.0.0.1', true) }}"
postgresql_use_official_repo: false
postgresql_package_dependencies:
  - ca-certificates
  - gnupg
postgresql_repo_key_url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
postgresql_repo_key_path: /etc/apt/trusted.gpg.d/postgresql.asc
postgresql_repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
postgresql_packages_base:
  - postgresql
  - postgresql-contrib
postgresql_extra_packages: []
postgresql_service_name: postgresql
postgresql_conf_path: /etc/postgresql/17/main/postgresql.conf
postgresql_hba_path: /etc/postgresql/17/main/pg_hba.conf
postgresql_listen_addresses: "127.0.0.1"
postgresql_port: 5432
postgresql_password_encryption: scram-sha-256
postgresql_allowed_hosts: []
postgresql_auth_method: scram-sha-256

postgresql_compose_project_dir: /opt/ai-workspace/postgres
postgresql_compose_file: "{{ postgresql_compose_project_dir }}/docker-compose.yml"
postgresql_compose_env_file: "{{ postgresql_compose_project_dir }}/postgres.env"
postgresql_compose_project_name: ai-workspace-postgres
postgresql_image: "postgres:17.7"
postgresql_container_name: ai-workspace-postgres
postgresql_data_dir: "{{ postgresql_compose_project_dir }}/data"
# 官方 postgres 镜像内 postgres 用户的 uid/gid（17.x 为 999）。数据目录必须归
# 该 uid，否则容器内 postgres 进程无法进入自己的 PGDATA（global/pg_filenode.map
# Permission denied）。首次 initdb 由 entrypoint chown，但非空 PGDATA 不再 chown，
# 故 ansible 须把目录直接建成该 uid，避免重跑时被重置回 root。
postgresql_container_uid: "999"
postgresql_container_gid: "999"
postgresql_database: postgres
postgresql_admin_user: "{{ lookup('ansible.builtin.env', 'POSTGRESQL_ADMIN_USER') | default('postgres', true) }}"
postgresql_admin_password_file: /root/.ai_workspace_postgres_password
postgresql_admin_password: "{{ lookup('ansible.builtin.env', 'POSTGRESQL_ADMIN_PASSWORD') | default(lookup('ansible.builtin.env', 'POSTGRES_PASSWORD') | default(lookup('ansible.builtin.env', 'POSTGRESQL_PASSWORD') | default(lookup('password', postgresql_admin_password_file ~ ' length=32 chars=ascii_letters,digits'), true), true), true) }}"
