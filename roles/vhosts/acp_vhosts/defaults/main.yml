---
acp_vhosts_domain: xworkmate-bridge.svc.plus
acp_vhosts_caddy_base_dir: "{{ /opt/homebrew/etc/caddy if ansible_os_family == Darwin else /etc/caddy }}"
acp_vhosts_caddyfile_path: "{{ acp_vhosts_caddy_base_dir }}/Caddyfile"
acp_vhosts_caddy_conf_dir: "{{ acp_vhosts_caddy_base_dir }}/conf.d"
acp_vhosts_caddy_fragment_path: "{{ acp_vhosts_caddy_base_dir }}/conf.d/acp-server.caddy"
acp_vhosts_codex_upstream_host: 127.0.0.1
acp_vhosts_codex_upstream_port: 9001
acp_vhosts_opencode_upstream_host: 127.0.0.1
acp_vhosts_opencode_upstream_port: 3910
acp_vhosts_obsolete_caddy_fragment_paths:
  - "{{ acp_vhosts_caddy_base_dir }}/conf.d/acp-server-codex.caddy"
  - "{{ acp_vhosts_caddy_base_dir }}/conf.d/acp-server-opencode.caddy"
acp_vhosts_allowed_origins:
  - https://xworkmate.svc.plus
  - http://localhost:*
  - http://127.0.0.1:*
