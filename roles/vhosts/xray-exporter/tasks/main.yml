---
- name: Determine architecture
  ansible.builtin.set_fact:
    xray_exporter_arch: >-
      {{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}

- name: Download xray-exporter binary
  ansible.builtin.get_url:
    url: "https://github.com/compassvpn/xray-exporter/releases/download/{{ xray_exporter_version }}/xray-exporter-linux-{{ xray_exporter_arch }}"
    dest: "{{ xray_exporter_binary_path }}"
    mode: '0755'
    owner: "{{ xray_exporter_user }}"
    group: "{{ xray_exporter_group }}"
  notify: Restart xray-exporters

- name: Stop and disable legacy xray-exporter services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop: "{{ xray_exporter_legacy_service_names }}"
  failed_when: false

- name: Remove legacy xray-exporter service files
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}.service"
    state: absent
  loop: "{{ xray_exporter_legacy_service_names }}"
  notify: Restart xray-exporters

- name: Install xray-exporter systemd service
  ansible.builtin.template:
    src: xray-exporter.service.j2
    dest: "/etc/systemd/system/{{ xray_exporter_instance.name }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ xray_exporter_instances }}"
  loop_control:
    loop_var: xray_exporter_instance
    label: "{{ xray_exporter_instance.name }}"
  notify: Restart xray-exporters

- name: Enable and start xray-exporter instances
  ansible.builtin.systemd:
    name: "{{ xray_exporter_instance.name }}"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ xray_exporter_instances }}"
  loop_control:
    loop_var: xray_exporter_instance
    label: "{{ xray_exporter_instance.name }}"
