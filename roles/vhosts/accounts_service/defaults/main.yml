---
accounts_service_image_ref: "{{ accounts_service_image_repo }}:{{ accounts_service_image_tag }}"
accounts_service_image_repo: ghcr.io/x-evor/accounts
accounts_service_image_tag: latest
accounts_service_registry_server: "{{ lookup('ansible.builtin.env', 'GHCR_REGISTRY') | default('ghcr.io', true) }}"
accounts_service_registry_username: "{{ lookup('ansible.builtin.env', 'GHCR_USERNAME') | default('', true) }}"
accounts_service_registry_password: "{{ lookup('ansible.builtin.env', 'GHCR_PASSWORD') | default(lookup('ansible.builtin.env', 'GHCR_TOKEN') | default('', true), true) }}"
accounts_service_pull_image: true
accounts_service_container_port: 8080
accounts_service_base_dir: /opt/cloud-neutral/accounts/managed
accounts_service_shared_network: cn-toolkit-shared
accounts_service_dns_servers:
  - 1.1.1.1
  - 8.8.8.8
accounts_service_caddy_root: "{{ caddy_config_dir | default('/etc/caddy', true) }}"
# gather_facts is false in deploy_accounts_svc_plus.yml, so ansible_os_family
# is undefined on the CI deploy; default('') falls through to the Linux path
# (the Darwin branch still works when facts are gathered, e.g. all-in-one).
accounts_service_caddy_base_dir: "{{ '/opt/homebrew/etc/caddy' if (ansible_os_family | default('')) == 'Darwin' else accounts_service_caddy_root }}"
accounts_service_caddyfile_path: "{{ accounts_service_caddy_base_dir }}/Caddyfile"
accounts_service_caddy_conf_dir: "{{ accounts_service_caddy_base_dir }}/conf.d"
accounts_service_caddy_fragment_path: "{{ accounts_service_caddy_base_dir }}/conf.d/accounts.caddy"
accounts_service_caddy_sites:
  - server_names:
      - accounts.svc.plus
    default_forwarded_host: svc.plus
    upstream: 127.0.0.1:18081
accounts_service_frontend_url: "{{ lookup('ansible.builtin.vars', 'ACCOUNTS_FRONTEND_URL', default=lookup('ansible.builtin.env', 'ACCOUNTS_FRONTEND_URL') | default('https://console.svc.plus', true)) }}"
accounts_service_allowed_origins: "{{ lookup('ansible.builtin.vars', 'ACCOUNTS_ALLOWED_ORIGINS', default=lookup('ansible.builtin.env', 'ACCOUNTS_ALLOWED_ORIGINS') | default(['https://dev.svc.plus', 'https://dev-homepage.svc.plus', 'https://www.svc.plus', 'https://svc.plus', 'https://global-homepage.svc.plus', 'https://www.xworkmate.com', 'https://xworkmate.com', 'https://accounts.svc.plus', 'https://console.svc.plus', 'https://console.xworkmate.com', 'https://localhost:8443', 'http://localhost:8080', 'http://127.0.0.1:8080', 'http://localhost:3001', 'http://127.0.0.1:3001', 'http://localhost:3000', 'http://127.0.0.1:3000'], true)) }}"
accounts_service_env_defaults:
  DB_HOST: stunnel-client
  DB_NAME: account
  DB_PASSWORD: "{{ lookup('ansible.builtin.env', 'ACCOUNT_PG_PASSWORD') | default('', true) }}"
  DB_PORT: "15432"
  DB_USER: account_user
  BRIDGE_AUTH_TOKEN: "{{ lookup('ansible.builtin.env', 'BRIDGE_AUTH_TOKEN') | default('', true) }}"
  BRIDGE_REVIEW_AUTH_TOKEN: "{{ lookup('ansible.builtin.env', 'BRIDGE_REVIEW_AUTH_TOKEN') | default('', true) }}"
  BRIDGE_SERVER_URL: "{{ lookup('ansible.builtin.env', 'BRIDGE_SERVER_URL') | default('https://xworkmate-bridge.svc.plus', true) }}"
  INTERNAL_SERVICE_TOKEN: ""
  POSTGRES_PASSWORD: "{{ lookup('ansible.builtin.env', 'ACCOUNT_PG_PASSWORD') | default('', true) }}"
  POSTGRES_USER: account_user
  SMTP_FROM: XControl Account <noreply@svc.plus>
  SMTP_HOST: smtp.qq.com
  SMTP_PASSWORD: ""
  SMTP_PORT: "587"
  SMTP_USERNAME: ""
  # CI env names use the OAUTH_GITHUB_* prefix because GitHub Actions forbids
  # secrets/env starting with GITHUB_; the container env keeps GITHUB_CLIENT_*.
  AUTH_TOKEN_PUBLIC_TOKEN: "{{ lookup('ansible.builtin.env', 'AUTH_TOKEN_PUBLIC_TOKEN') | default('', true) }}"
  AUTH_TOKEN_REFRESH_SECRET: "{{ lookup('ansible.builtin.env', 'AUTH_TOKEN_REFRESH_SECRET') | default('', true) }}"
  AUTH_TOKEN_ACCESS_SECRET: "{{ lookup('ansible.builtin.env', 'AUTH_TOKEN_ACCESS_SECRET') | default('', true) }}"
  GITHUB_CLIENT_ID: "{{ lookup('ansible.builtin.env', 'OAUTH_GITHUB_CLIENT_ID') | default('', true) }}"
  GITHUB_CLIENT_SECRET: "{{ lookup('ansible.builtin.env', 'OAUTH_GITHUB_CLIENT_SECRET') | default('', true) }}"
  GOOGLE_CLIENT_ID: "{{ lookup('ansible.builtin.env', 'OAUTH_GOOGLE_CLIENT_ID') | default('', true) }}"
  GOOGLE_CLIENT_SECRET: "{{ lookup('ansible.builtin.env', 'OAUTH_GOOGLE_CLIENT_SECRET') | default('', true) }}"
  XWORKMATE_VAULT_ADDR: https://vault.svc.plus
  XWORKMATE_VAULT_MOUNT: kv
  XWORKMATE_VAULT_NAMESPACE: ""
  XWORKMATE_VAULT_TOKEN: ""
accounts_service_targets:
  - name: prod
    compose_dir: "{{ accounts_service_base_dir }}/prod"
    compose_file: "{{ accounts_service_base_dir }}/prod/docker-compose.yml"
    env_file: "{{ accounts_service_base_dir }}/prod/env/app.env"
    config_file: "{{ accounts_service_base_dir }}/prod/config/account.yaml"
    legacy_env_file: /opt/cloud-neutral/accounts/accounts-51945b5-contabo/env/app.env
    container_name: accounts
    host_port: 18081
