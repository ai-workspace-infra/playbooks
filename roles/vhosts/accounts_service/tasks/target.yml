---
- name: Ensure compose directories exist for {{ accounts_service_target.name }}
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ accounts_service_target.compose_dir }}"
    - "{{ accounts_service_target.compose_dir }}/env"
    - "{{ accounts_service_target.compose_dir }}/config"

- name: Check for managed env file for {{ accounts_service_target.name }}
  ansible.builtin.stat:
    path: "{{ accounts_service_target.env_file }}"
  register: accounts_service_target_managed_env_stat

- name: Check for legacy env file for {{ accounts_service_target.name }}
  ansible.builtin.stat:
    path: "{{ accounts_service_target.legacy_env_file }}"
  register: accounts_service_target_legacy_env_stat

- name: Seed managed env file from legacy deployment for {{ accounts_service_target.name }}
  ansible.builtin.copy:
    src: "{{ accounts_service_target.legacy_env_file }}"
    dest: "{{ accounts_service_target.env_file }}"
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  when:
    - not accounts_service_target_managed_env_stat.stat.exists
    - accounts_service_target_legacy_env_stat.stat.exists

- name: Render managed env file from defaults for {{ accounts_service_target.name }}
  ansible.builtin.template:
    src: app.env.j2
    dest: "{{ accounts_service_target.env_file }}"
    owner: root
    group: root
    mode: "0600"
  when:
    - not accounts_service_target_managed_env_stat.stat.exists
    - not accounts_service_target_legacy_env_stat.stat.exists

- name: Ensure managed CONFIG_TEMPLATE is present for {{ accounts_service_target.name }}
  ansible.builtin.lineinfile:
    path: "{{ accounts_service_target.env_file }}"
    regexp: '^CONFIG_TEMPLATE='
    line: 'CONFIG_TEMPLATE=/etc/xcontrol/account.template.yaml'
    state: present
    insertafter: '^CONFIG_PATH='

- name: Ensure managed CONFIG_PATH is present for {{ accounts_service_target.name }}
  ansible.builtin.lineinfile:
    path: "{{ accounts_service_target.env_file }}"
    regexp: '^CONFIG_PATH='
    line: 'CONFIG_PATH=/etc/xcontrol/account.yaml'
    state: present
    insertbefore: BOF

- name: Ensure managed IMAGE is present for {{ accounts_service_target.name }}
  ansible.builtin.lineinfile:
    path: "{{ accounts_service_target.env_file }}"
    regexp: '^IMAGE='
    line: 'IMAGE={{ accounts_service_image_ref }}'
    state: present
    insertafter: '^CONFIG_TEMPLATE='

- name: Ensure managed xworkmate bridge env is present for {{ accounts_service_target.name }}
  ansible.builtin.lineinfile:
    path: "{{ accounts_service_target.env_file }}"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
    insertafter: '^IMAGE='
  loop:
    - key: BRIDGE_AUTH_TOKEN
      value: "{{ accounts_service_env_defaults.BRIDGE_AUTH_TOKEN }}"
    - key: BRIDGE_REVIEW_AUTH_TOKEN
      value: "{{ accounts_service_env_defaults.BRIDGE_REVIEW_AUTH_TOKEN }}"
    - key: BRIDGE_SERVER_URL
      value: "{{ accounts_service_env_defaults.BRIDGE_SERVER_URL }}"
    - key: XWORKMATE_BRIDGE_SERVER_URL
      value: "{{ accounts_service_env_defaults.XWORKMATE_BRIDGE_SERVER_URL }}"
  no_log: true

# The env file is seeded once from the legacy deployment and never re-rendered,
# so every key that must track pipeline secrets needs an explicit lineinfile
# below. XWORKMATE_VAULT_TOKEN previously had no such task: the legacy token
# stayed in app.env after it was revoked and every sync failed with Vault 403
# ("bridge auth token is unavailable" in the app). The accounts deploy pipeline
# now mints a fresh token every run and passes it via env, so this task rotates
# the host token on each deploy.
- name: Warn when XWORKMATE_VAULT_TOKEN is not provided for {{ accounts_service_target.name }}
  ansible.builtin.debug:
    msg: >-
      XWORKMATE_VAULT_TOKEN is empty; keeping the existing value in
      {{ accounts_service_target.env_file }}. If xworkmate sync fails with
      "bridge auth token is unavailable", run the accounts deploy pipeline
      (which mints and injects a fresh token) or set the value manually.
  when: (accounts_service_env_defaults.XWORKMATE_VAULT_TOKEN | trim) == ''

- name: Ensure managed xworkmate vault env is present for {{ accounts_service_target.name }}
  ansible.builtin.lineinfile:
    path: "{{ accounts_service_target.env_file }}"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
    insertafter: '^IMAGE='
  loop:
    - key: XWORKMATE_VAULT_ADDR
      value: "{{ accounts_service_env_defaults.XWORKMATE_VAULT_ADDR }}"
    - key: XWORKMATE_VAULT_MOUNT
      value: "{{ accounts_service_env_defaults.XWORKMATE_VAULT_MOUNT }}"
    - key: XWORKMATE_VAULT_NAMESPACE
      value: "{{ accounts_service_env_defaults.XWORKMATE_VAULT_NAMESPACE }}"
    - key: XWORKMATE_VAULT_TOKEN
      value: "{{ accounts_service_env_defaults.XWORKMATE_VAULT_TOKEN }}"
  # Skip empty values so a deploy without the secret never blanks a working
  # token (namespace is legitimately empty and simply keeps the seeded line).
  when: (item.value | trim) != ''
  no_log: true

- name: Ensure managed auth/oauth env is present for {{ accounts_service_target.name }}
  ansible.builtin.lineinfile:
    path: "{{ accounts_service_target.env_file }}"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
    insertafter: '^IMAGE='
  loop:
    - key: AUTH_TOKEN_PUBLIC_TOKEN
      value: "{{ accounts_service_env_defaults.AUTH_TOKEN_PUBLIC_TOKEN }}"
    - key: AUTH_TOKEN_REFRESH_SECRET
      value: "{{ accounts_service_env_defaults.AUTH_TOKEN_REFRESH_SECRET }}"
    - key: AUTH_TOKEN_ACCESS_SECRET
      value: "{{ accounts_service_env_defaults.AUTH_TOKEN_ACCESS_SECRET }}"
    - key: GITHUB_CLIENT_ID
      value: "{{ accounts_service_env_defaults.GITHUB_CLIENT_ID }}"
    - key: GITHUB_CLIENT_SECRET
      value: "{{ accounts_service_env_defaults.GITHUB_CLIENT_SECRET }}"
    - key: GOOGLE_CLIENT_ID
      value: "{{ accounts_service_env_defaults.GOOGLE_CLIENT_ID }}"
    - key: GOOGLE_CLIENT_SECRET
      value: "{{ accounts_service_env_defaults.GOOGLE_CLIENT_SECRET }}"
  no_log: true

- name: Ensure managed stripe env is present for {{ accounts_service_target.name }}
  ansible.builtin.lineinfile:
    path: "{{ accounts_service_target.env_file }}"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
    insertafter: '^IMAGE='
  loop:
    - key: STRIPE_SECRET_KEY
      value: "{{ accounts_service_env_defaults.STRIPE_SECRET_KEY }}"
    - key: STRIPE_WEBHOOK_SECRET
      value: "{{ accounts_service_env_defaults.STRIPE_WEBHOOK_SECRET }}"
    - key: STRIPE_ALLOWED_PRICE_IDS
      value: "{{ accounts_service_env_defaults.STRIPE_ALLOWED_PRICE_IDS }}"
  no_log: true

- name: Render managed account config for {{ accounts_service_target.name }}
  ansible.builtin.template:
    src: account.yaml.j2
    dest: "{{ accounts_service_target.config_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render compose file for {{ accounts_service_target.name }}
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ accounts_service_target.compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Pull image for {{ accounts_service_target.name }}
  ansible.builtin.command: docker compose -f "{{ accounts_service_target.compose_file }}" pull app
  args:
    chdir: "{{ accounts_service_target.compose_dir }}"
  when: accounts_service_pull_image | bool

- name: Remove any container currently bound to {{ accounts_service_target.host_port }}
  ansible.builtin.shell: |
    set -euo pipefail
    ids="$(docker ps --filter publish={{ accounts_service_target.host_port }} -q)"
    if [ -z "${ids}" ]; then
      exit 0
    fi
    docker rm -f ${ids}
  args:
    executable: /bin/bash
  register: accounts_service_target_port_cleanup
  changed_when: accounts_service_target_port_cleanup.stdout | trim != ""

- name: Start managed compose target for {{ accounts_service_target.name }}
  ansible.builtin.command: docker compose -f "{{ accounts_service_target.compose_file }}" up -d --force-recreate --remove-orphans
  args:
    chdir: "{{ accounts_service_target.compose_dir }}"
