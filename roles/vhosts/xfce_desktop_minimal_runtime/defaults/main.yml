---
xfce_user: ubuntu

xfce_packages:
  - xfce4-session
  - xfwm4
  - xfdesktop4
  - xfce4-panel
  - xfce4-terminal
  - dbus-x11
  - fonts-noto-cjk
  - xserver-xorg-core

# 不钉具体构建号：Google apt 源只保留当前 stable，任何固定版本几周后即消失
# 导致 "no available installation candidate"。留空 = 装当前可用的 google-chrome-stable。
# 如确需复现某版本，可设为该 madison 中仍存在的版本串（缺失时自动回退最新）。
xfce_google_chrome_version: ""
xfce_google_chrome_apt_key_url: "https://dl.google.com/linux/linux_signing_key.pub"
xfce_google_chrome_apt_keyring: "/etc/apt/keyrings/google-linux-signing-key.gpg"
xfce_google_chrome_apt_source: "deb [arch=amd64 signed-by={{ xfce_google_chrome_apt_keyring }}] https://dl.google.com/linux/chrome/deb/ stable main"
xfce_google_chrome_desktop_file: google-chrome-xrdp.desktop
xfce_browser_package: "{{ 'google-chrome-stable' if ansible_architecture in ['x86_64', 'amd64'] else '' }}"
xfce_browser_binary: "{{ '/usr/bin/google-chrome-stable' if ansible_architecture in ['x86_64', 'amd64'] else '/usr/local/bin/chromium' }}"
xfce_browser_name: "{{ 'Google Chrome' if ansible_architecture in ['x86_64', 'amd64'] else 'Chromium' }}"
xfce_browser_icon: "{{ 'google-chrome' if ansible_architecture in ['x86_64', 'amd64'] else 'chromium' }}"
xfce_offline_active: "{{ lookup('ansible.builtin.env', 'AI_WORKSPACE_OFFLINE_ACTIVE') | default('false', true) | bool }}"

xfce_desktop_install_nodejs_runtime: true
xfce_desktop_install_playwright_runtime: true
