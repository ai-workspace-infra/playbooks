---
- name: Install Gemini ACP packages
  ansible.builtin.apt:
    name: "{{ acp_gemini_packages }}"
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    APT_LISTCHANGES_FRONTEND: none
  become: true
  when:
    - acp_gemini_packages | default([]) | length > 0
    - ansible_os_family == 'Debian'
