---
acp_gemini_service_name: acp-gemini
acp_gemini_service_user: "{{ ansible_env.USER | default('ubuntu') if ansible_os_family == 'Darwin' else 'ubuntu' }}"
acp_gemini_service_group: "{{ 'staff' if ansible_os_family == 'Darwin' else 'ubuntu' }}"
acp_gemini_home: "{{ ansible_env.HOME | default('/home/' + acp_gemini_service_user) if ansible_os_family == 'Darwin' else '/home/ubuntu' }}"
acp_gemini_workdir: "{{ acp_gemini_home }}/.gemini"
acp_gemini_xdg_config_home: "{{ acp_gemini_home }}/.config"
acp_gemini_xdg_state_home: "{{ acp_gemini_home }}/.local/state"
acp_gemini_config_dir: "{{ acp_gemini_home }}/.gemini"
acp_gemini_npm_global_bin: "{{ acp_gemini_home + '/.local/bin' if ansible_os_family == 'Darwin' else '/usr/bin' }}"
acp_gemini_binary_path: "{{ acp_gemini_npm_global_bin }}/gemini"
acp_gemini_path: "{{ acp_gemini_npm_global_bin }}:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin"
acp_gemini_args: --experimental-acp
acp_gemini_bridge_local_source_dir: "{{ playbook_dir }}/../xworkmate-bridge"
acp_gemini_bridge_local_build_dir: "{{ playbook_dir }}/.artifacts/acp_gemini"
acp_gemini_bridge_local_binary_path: "{{ acp_gemini_bridge_local_build_dir }}/xworkmate-go-core"
acp_gemini_bridge_build_goos: "{{ 'darwin' if ansible_os_family == 'Darwin' else 'linux' }}"
acp_gemini_bridge_build_goarch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"
acp_gemini_bridge_binary_path: /usr/local/bin/xworkmate-go-core
acp_gemini_bridge_use_prebuilt: "{{ lookup('ansible.builtin.env', 'AI_WORKSPACE_USE_PREBUILT_BRIDGE') | default('false', true) | bool }}"
acp_gemini_listen_host: 127.0.0.1
acp_gemini_listen_port: 8791
acp_gemini_packages: []
acp_gemini_caddy_conf_dir: /etc/caddy/conf.d
acp_gemini_enable_ufw: false
acp_gemini_caddyfile_path: /etc/caddy/Caddyfile
acp_gemini_allowed_origins:
  - https://xworkmate.svc.plus
  - http://localhost:*
  - http://127.0.0.1:*
acp_gemini_public_base_url: https://xworkmate-bridge.svc.plus/gemini
acp_gemini_manage_caddy: false
acp_gemini_auth_token: "{{ lookup('ansible.builtin.env', 'INTERNAL_SERVICE_TOKEN') | default('', true) }}"
acp_gemini_environment:
  XDG_CONFIG_HOME: "{{ acp_gemini_xdg_config_home }}"
  XDG_STATE_HOME: "{{ acp_gemini_xdg_state_home }}"
  GEMINI_CONFIG_DIR: "{{ acp_gemini_config_dir }}"
  ACP_GEMINI_BIN: "{{ acp_gemini_binary_path }}"
acp_gemini_obsolete_caddy_fragment_paths:
  - /etc/caddy/conf.d/acp-server-gemini.caddy
  - /etc/caddy/conf.d/acp-server.caddy
