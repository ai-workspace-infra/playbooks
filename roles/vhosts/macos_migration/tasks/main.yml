---
- name: Import Darwin assertion
  ansible.builtin.import_tasks: assert_darwin.yml

- name: Show macos_migration usage
  ansible.builtin.debug:
    msg:
      - "roles/vhosts/macos_migration has no default action — select one via tasks_from:"
      - "  tasks_from: backup.yml   -> snapshot apps/directories/Brewfile to macos_migration_backup_archive"
      - "  tasks_from: restore.yml  -> restore from macos_migration_restore_archive"
      - "  tasks_from: migrate.yml  -> pull a backup archive from macos_migration_source_host and restore it"
