---
# macOS application/directory backup, restore, and cross-OS-version migration.
# All paths are resolved against the *local* invoking user's HOME
# (this role always runs with connection: local / become: no).

# ---------------------------------------------------------------------------
# Where backups land
# ---------------------------------------------------------------------------
# e.g. an external drive: macos_migration_backup_root: "/Volumes/Backup"
macos_migration_backup_root: "{{ ansible_env.HOME }}/.local/state/xworkspace/macos-migration"
# Frozen once via set_fact at the top of backup.yml, both of these. A
# lookup()-based default here would re-render (and re-invoke `date`) on every
# reference, so the staging dir Ansible creates and the name it later tars up
# could end up on different seconds and no longer match.
#
# Subdirectory per run: "<macOS product version>-<backup date>", e.g.
# "15.5-20260710", so multiple machines/OS versions backed up to the same
# macos_migration_backup_root stay visibly separated.
macos_migration_backup_subdir: ""
macos_migration_backup_name: ""
macos_migration_backup_dir: "{{ macos_migration_backup_root }}/{{ macos_migration_backup_subdir }}/{{ macos_migration_backup_name }}"
macos_migration_backup_archive: "{{ macos_migration_backup_root }}/{{ macos_migration_backup_subdir }}/{{ macos_migration_backup_name }}.tar.gz"

# Archive to restore from. Must be set explicitly for restore.yml/migrate.yml.
macos_migration_restore_archive: ""

# ---------------------------------------------------------------------------
# Pre-flight disk space check
# ---------------------------------------------------------------------------
# Required free space = estimated payload size * this ratio (buffer for the
# tar archive plus, on restore, the extraction staging copy).
macos_migration_min_free_space_ratio: 1.5
# Restore estimates off the compressed archive size (the original directories
# no longer exist locally to `du`), so it needs a larger buffer to cover both
# extraction and the final copy-out.
macos_migration_restore_min_free_space_ratio: 3.0
macos_migration_skip_space_check: false

# ---------------------------------------------------------------------------
# What to capture — custom app list and app/user directories
# ---------------------------------------------------------------------------
macos_migration_applications_dir: "/Applications"

# "list" (default, lightweight): record just the resolved app *names* in
# manifest.json — no bytes copied, same spirit as brew's "bundle" mode.
# Good for an inventory of what to reinstall via Homebrew/App Store;
# restore.yml reports the list, it does not restore any binaries.
# "copy": ditto-copy each resolved app's actual bundle into the backup —
# heavy (can be many GB per app), counted in the pre-flight space check.
# Use this only for apps that can't be trivially reinstalled otherwise.
macos_migration_apps_capture_mode: "list"

# When true, scan macos_migration_applications_dir for every top-level *.app
# bundle instead of relying solely on the manual list below.
macos_migration_apps_auto_discover: false

# Manual bundle names under macos_migration_applications_dir, e.g.:
#   macos_migration_apps:
#     - "Visual Studio Code.app"
#     - "iTerm.app"
# Always included in the final capture set — additive on top of auto-discover
# when that's enabled. Only apps NOT reinstalled via Homebrew belong here —
# brew-managed apps are already covered by the Brewfile capture below and
# should be reinstalled via `brew bundle`, not binary-copied (safer across
# Intel/Apple Silicon moves).
macos_migration_apps: []

# Exact bundle names to drop from the final capture set. Applies after
# auto-discover + the manual list are combined, so it's a real override —
# use it to exclude specific huge/unwanted apps (e.g. "Xcode.app") that
# auto-discover would otherwise sweep in.
macos_migration_apps_exclude: []

# Arbitrary files/directories to carry over, e.g.:
#   macos_migration_directories:
#     - name: iterm2-prefs
#       path: "{{ ansible_env.HOME }}/Library/Preferences/com.googlecode.iterm2.plist"
#     - name: vscode-user
#       path: "{{ ansible_env.HOME }}/Library/Application Support/Code/User"
#     - name: ssh
#       path: "{{ ansible_env.HOME }}/.ssh"
#     - name: workspaces
#       path: "{{ ansible_env.HOME }}/workspaces"
#       excludes:              # added on top of macos_migration_directories_exclude below
#         - some-project/.terraform
macos_migration_directories: []

# rsync --exclude patterns applied to every macos_migration_directories entry
# (a per-entry `excludes` list adds to this, it doesn't replace it). Patterns
# without a "/" match the basename at any depth, so "node_modules" excludes
# it everywhere under a source tree, not just at the top level. Defaults
# cover the common regenerable build/dependency/cache junk that has no
# business in a config/dotfile backup — set to [] to disable.
macos_migration_directories_exclude:
  - node_modules
  - .build
  - .build-local
  - build
  - dist
  - .next
  - target
  - out
  - .cache
  - .turbo
  - .parcel-cache
  - .pytest_cache
  - __pycache__
  - .venv
  - "*.dSYM"
  - .xcodeinsight
  - .DS_Store

# ---------------------------------------------------------------------------
# Homebrew — unrelated to macos_migration_applications_dir/apps above; this is
# about the Homebrew installation itself (its prefix directory), not any app
# under /Applications.
# ---------------------------------------------------------------------------
# "none"      -> capture nothing.
# "bundle"    -> `brew bundle dump`/`install`: a lightweight manifest of taps/
#                formulae/casks/mas apps, reinstalled fresh on restore. Small,
#                and safe across macOS version/CPU architecture changes since
#                everything is rebuilt from source/bottles on the new machine.
# "directory" -> full byte-for-byte copy of the Homebrew prefix directory
#                (Cellar, Caskroom, downloads cache, everything) with `ditto`.
#                Restores instantly with no re-downloading, but is much
#                larger and the compiled binaries are NOT portable across CPU
#                architecture (and often not across macOS major versions).
# "both"      -> capture/restore both of the above.
macos_migration_brew_capture_mode: "bundle"
macos_migration_brewfile_name: "Brewfile"
# Homebrew install prefix for "directory"/"both" mode, e.g. /opt/homebrew or
# /usr/local. Empty = auto-detect via `brew --prefix` at backup time.
macos_migration_brew_prefix: ""
# Run `brew bundle install` from the captured Brewfile during restore.
macos_migration_restore_run_brew_bundle: true

# ---------------------------------------------------------------------------
# Restore behavior
# ---------------------------------------------------------------------------
# When false (default), existing destinations are left untouched (skipped)
# instead of being overwritten.
macos_migration_restore_overwrite: false

# ---------------------------------------------------------------------------
# Migration (pull directly from a source Mac over ssh)
# ---------------------------------------------------------------------------
macos_migration_source_host: ""
macos_migration_source_user: "{{ ansible_env.USER | default('') }}"
# Remote path to an already-produced backup archive (see backup.yml) to pull
# and restore locally. If empty, migrate.yml expects the caller to have set
# macos_migration_restore_archive to a locally-reachable archive already.
macos_migration_source_archive: ""
