---
# ===== Base system (always) =====
# The Base hardening tasks below set timezone (timedatectl), rewrite
# /etc/hostname + /etc/hosts, set the hostname, harden ssh, configure fail2ban,
# raise file limits and open firewall ports. They all run with become: true and
# rely on Linux-only tooling/paths, so they are skipped on macOS (Darwin), where
# the deploy runs unprivileged. macOS prerequisites are handled by
# common_darwin.yml instead.
- name: Base | set timezone
  ansible.builtin.command: "timedatectl set-timezone Asia/Shanghai"
  changed_when: false
  become: true
  when: ansible_os_family != 'Darwin'

- name: Base | render /etc/hostname
  ansible.builtin.template:
    src: templates/hostname.j2
    dest: /etc/hostname
    owner: root
    group: root
    mode: "0644"
  become: true
  when: ansible_os_family != 'Darwin'

- name: Base | set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  become: true
  when: ansible_os_family != 'Darwin'

- name: Base | update /etc/hosts
  ansible.builtin.template:
    src: templates/hosts
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"
  become: true
  when: ansible_os_family != 'Darwin'

- name: Base | harden ssh
  ansible.builtin.script: files/secure_ssh.sh
  become: true
  when: ansible_os_family != 'Darwin'

- name: Base | harden ssh config
  ansible.builtin.import_tasks: harden_ssh.yml
  tags: [ssh, security]
  when: ansible_os_family != 'Darwin'

- name: Base | configure fail2ban
  ansible.builtin.import_tasks: fail2ban.yml
  tags: [fail2ban, security]
  when: ansible_os_family != 'Darwin'

- name: Base | file limits
  ansible.builtin.import_tasks: limits.yml
  when:
    - common_security_limits.enabled | default(true) | bool
    - ansible_os_family != 'Darwin'
  tags: [limits, baseline]

- name: Base | allow HTTP/HTTPS ports
  ansible.builtin.import_tasks: firewall_ports.yml
  when:
    - common_firewall.enabled | default(true) | bool
    - ansible_os_family != 'Darwin'
  tags: [firewall, baseline]

# ===== Common baseline (OS split) =====
- name: Common | Debian family baseline
  ansible.builtin.import_tasks: common_debian.yml
  when:
    - enable_common | bool
    - ansible_facts.os_family == "Debian"

- name: Common | RedHat family baseline
  ansible.builtin.import_tasks: common_redhat.yml
  when:
    - enable_common | bool
    - ansible_facts.os_family == "RedHat"

- name: Common | Darwin (macOS) baseline
  ansible.builtin.import_tasks: common_darwin.yml
  when:
    - enable_common | bool
    - ansible_facts.os_family == "Darwin"

# ===== Add-ons (default OFF) =====
- name: Addon | S3FS mount
  ansible.builtin.import_tasks: addons/s3fs.yml
  when: s3fs_enable | default(false) | bool
  tags: [s3fs, mount]

- name: Addon | GPU configuration
  ansible.builtin.import_tasks: addons/gpu.yml
  when: gpu_enable | default(false) | bool
  tags: [gpu, nvidia]
