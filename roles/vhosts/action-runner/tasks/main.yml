---
- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Create runner user
  ansible.builtin.user:
    name: runner
    state: present
    create_home: yes
    groups: docker
    append: yes
  when: runner_engine == 'github'

- name: Setup GitHub Actions Runner
  block:
    - name: Create runner directory
      ansible.builtin.file:
        path: /home/runner/actions-runner
        state: directory
        owner: runner
        group: runner
        mode: '0755'

    - name: Download GitHub runner
      ansible.builtin.unarchive:
        src: "https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-linux-x64-{{ github_runner_version }}.tar.gz"
        dest: /home/runner/actions-runner
        remote_src: yes
        owner: runner
        group: runner

    - name: Fetch Action Runner token from Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_addr }}"
        auth_method: token
        token: "{{ vault_token }}"
        path: "kv/data/{{ vault_env_path }}/action-runner"
        engine_mount_point: "kv"
      register: vault_action_runner_secret
      failed_when: false
      when: vault_token | length > 0
      delegate_to: localhost
      run_once: true

    - name: Set Runner Token Fact
      ansible.builtin.set_fact:
        resolved_runner_token: "{{ lookup('env', 'GITHUB_RUNNER_TOKEN') | default(vault_action_runner_secret.secret.TOKEN | default('', true), true) }}"
      no_log: true

    - name: Fail if Runner Token is not available
      ansible.builtin.fail:
        msg: "GitHub Runner token is required but not found in env or Vault."
      when: resolved_runner_token | length == 0

    - name: Check if already configured
      ansible.builtin.stat:
        path: /home/runner/actions-runner/.runner
      register: github_runner_config

    - name: Configure GitHub runner
      ansible.builtin.command: >
        ./config.sh --url https://github.com/{{ github_org_repo }}
        --token {{ resolved_runner_token }}
        --name {{ runner_name }}
        --labels {{ runner_labels }}
        --unattended
      args:
        chdir: /home/runner/actions-runner
      become: yes
      become_user: runner
      when: not github_runner_config.stat.exists

    - name: Get runner UID
      ansible.builtin.command: id -u runner
      register: runner_uid
      changed_when: false

    - name: Enable systemd lingering for runner user
      ansible.builtin.command: loginctl enable-linger runner
      become: yes

    - name: Ensure systemd user directory exists
      ansible.builtin.file:
        path: /home/runner/.config/systemd/user
        state: directory
        owner: runner
        group: runner
        mode: '0755'
      become: yes
      become_user: runner

    - name: Create GitHub runner user service
      ansible.builtin.template:
        src: github-runner.service.j2
        dest: /home/runner/.config/systemd/user/github-runner.service
        owner: runner
        group: runner
        mode: '0644'
      become: yes
      become_user: runner
      notify: restart github_runner

    - name: Enable and start GitHub runner service (Rootless)
      ansible.builtin.systemd:
        name: github-runner
        state: started
        enabled: yes
        daemon_reload: yes
        scope: user
      become: yes
      become_user: runner
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ runner_uid.stdout }}"
  when: runner_engine == 'github'

- name: Setup Gitea act_runner
  block:
    - name: Download Gitea act_runner
      ansible.builtin.get_url:
        url: "https://dl.gitea.com/act_runner/{{ gitea_runner_version }}/act_runner-{{ gitea_runner_version }}-linux-amd64"
        dest: /usr/local/bin/act_runner
        mode: '0755'

    - name: Create working directory
      ansible.builtin.file:
        path: /opt/act_runner
        state: directory
        mode: '0755'

    - name: Check if already registered
      ansible.builtin.stat:
        path: /opt/act_runner/.runner
      register: gitea_runner_config

    - name: Register Gitea runner
      ansible.builtin.command: >
        act_runner register
        --instance {{ gitea_instance_url }}
        --token {{ gitea_runner_token }}
        --name {{ runner_name }}
        --labels {{ runner_labels }}
        --no-interactive
      args:
        chdir: /opt/act_runner
      when: not gitea_runner_config.stat.exists

    - name: Create act_runner systemd service
      ansible.builtin.template:
        src: act_runner.service.j2
        dest: /etc/systemd/system/act_runner.service
        mode: '0644'
      notify: restart act_runner

    - name: Enable and start act_runner service
      ansible.builtin.systemd:
        name: act_runner
        state: started
        enabled: yes
        daemon_reload: yes
  when: runner_engine == 'gitea'
