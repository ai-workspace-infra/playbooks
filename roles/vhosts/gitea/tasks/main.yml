---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - caddy
    state: present

- name: Stop and disable native PostgreSQL (Deprecated)
  ansible.builtin.systemd:
    name: postgresql
    state: stopped
    enabled: no
  ignore_errors: true

- name: Create Gitea database user via Docker
  ansible.builtin.shell: |
    docker exec postgresql-svc-plus psql -U postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='gitea'" | grep -q 1 || \
    docker exec postgresql-svc-plus psql -U postgres -c "CREATE USER gitea WITH PASSWORD 'gitea' LOGIN;"
  changed_when: false

- name: Create Gitea database via Docker
  ansible.builtin.shell: |
    docker exec postgresql-svc-plus psql -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='gitea'" | grep -q 1 || \
    docker exec postgresql-svc-plus psql -U postgres -c "CREATE DATABASE gitea OWNER gitea ENCODING 'UTF8';"
  changed_when: false

- name: Create git user
  ansible.builtin.user:
    name: git
    system: yes
    shell: /bin/bash
    comment: 'Git Version Control'
    create_home: yes
    home: /home/git

- name: Download Gitea binary
  ansible.builtin.get_url:
    url: "https://dl.gitea.com/gitea/1.22.6/gitea-1.22.6-linux-amd64"
    dest: /usr/local/bin/gitea
    mode: '0755'

- name: Create Gitea directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: git
    group: git
    mode: '0750'
  loop:
    - /var/lib/gitea
    - /var/lib/gitea/custom
    - /var/lib/gitea/data
    - /var/lib/gitea/data/lfs
    - /var/lib/gitea/indexers
    - /var/lib/gitea/log

- name: Create Gitea config directory
  ansible.builtin.file:
    path: /etc/gitea
    state: directory
    owner: root
    group: git
    mode: '0770'

- name: Deploy Gitea app.ini (S3 Storage Config)
  ansible.builtin.template:
    src: app.ini.j2
    dest: /var/lib/gitea/custom/conf/app.ini
    owner: git
    group: git
    mode: '0640'
  notify:
    - Restart gitea


- name: Deploy Gitea systemd service
  ansible.builtin.template:
    src: gitea.service.j2
    dest: /etc/systemd/system/gitea.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart gitea

- name: Start and enable Gitea service
  ansible.builtin.systemd:
    name: gitea
    enabled: yes
    state: started

- name: Ensure Caddy conf.d directory exists
  ansible.builtin.file:
    path: /etc/caddy/conf.d
    state: directory
    mode: '0755'

- name: Configure Caddy for Gitea in conf.d
  ansible.builtin.copy:
    dest: /etc/caddy/conf.d/gitea.svc.plus.caddy
    content: |
      gitea.svc.plus {
          reverse_proxy localhost:3001
      }
    mode: '0644'
  notify:
    - Restart caddy
