---
acp_codex_service_name: acp-codex
acp_codex_runtime_user: "{{ ansible_env.USER | default('ubuntu') }}"
acp_codex_runtime_group: "{{ 'staff' if ansible_os_family == 'Darwin' else (ansible_env.USER | default('ubuntu')) }}"
acp_codex_runtime_home: "{{ ansible_env.HOME | default('/home/' + acp_codex_runtime_user) }}"
acp_codex_service_user: "{{ acp_codex_runtime_user }}"
acp_codex_service_group: "{{ acp_codex_runtime_group }}"
acp_codex_workdir: "{{ acp_codex_runtime_home }}"
acp_codex_shell: /bin/bash
acp_codex_npm_global_bin: /usr/bin
acp_codex_binary_path: "{{ acp_codex_npm_global_bin }}/codex"
acp_codex_path: "{{ acp_codex_npm_global_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
acp_codex_listen_host: 127.0.0.1
acp_codex_listen_port: 9001
acp_codex_packages: []
acp_codex_manage_caddy: false
acp_codex_enable_ufw: false
acp_codex_caddy_base_dir: "{{ '/opt/homebrew/etc/caddy' if ansible_os_family == 'Darwin' else '/etc/caddy' }}"
acp_codex_caddyfile_path: "{{ acp_codex_caddy_base_dir }}/Caddyfile"
acp_codex_caddy_conf_dir: "{{ acp_codex_caddy_base_dir }}/conf.d"
acp_codex_bridge_service_name: xworkmate-bridge
acp_codex_bridge_local_source_dir: "{{ playbook_dir }}/../xworkmate-bridge"
acp_codex_bridge_local_build_dir: "{{ playbook_dir }}/.artifacts/acp_codex"
acp_codex_bridge_local_binary_path: "{{ acp_codex_bridge_local_build_dir }}/xworkmate-go-core"
acp_codex_bridge_build_goos: "{{ 'darwin' if ansible_os_family == 'Darwin' else 'linux' }}"
acp_codex_bridge_build_goarch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"
acp_codex_bridge_binary_path: /usr/local/bin/xworkmate-go-core
acp_codex_bridge_use_prebuilt: "{{ lookup('ansible.builtin.env', 'AI_WORKSPACE_USE_PREBUILT_BRIDGE') | default('false', true) | bool }}"
acp_codex_bridge_listen_host: 127.0.0.1
acp_codex_bridge_listen_port: 8787
acp_codex_bridge_allowed_origins:
  - https://xworkmate.svc.plus
  - http://localhost:*
  - http://127.0.0.1:*
acp_codex_public_base_url: https://xworkmate-bridge.svc.plus/codex
acp_codex_auth_token: "{{ lookup('ansible.builtin.env', 'INTERNAL_SERVICE_TOKEN') | default('', true) }}"
acp_codex_environment: {}
acp_codex_obsolete_caddy_fragment_paths:
  - "{{ acp_codex_caddy_conf_dir }}/acp-server-codex.caddy"
  - "{{ acp_codex_caddy_conf_dir }}/acp-server.caddy"
