---
- name: Ensure local Codex ACP build directory exists
  ansible.builtin.file:
    path: "{{ acp_codex_bridge_local_build_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  when: not (acp_codex_bridge_use_prebuilt | bool)

- name: Build XWorkmate Go ACP server locally
  ansible.builtin.command:
    cmd: go build -o "{{ acp_codex_bridge_local_binary_path }}" .
    chdir: "{{ acp_codex_bridge_local_source_dir }}"
  environment:
    GOOS: "{{ acp_codex_bridge_build_goos }}"
    GOARCH: "{{ acp_codex_bridge_build_goarch }}"
    CGO_ENABLED: "0"
  delegate_to: localhost
  become: false
  check_mode: false
  when: not (acp_codex_bridge_use_prebuilt | bool)

- name: Inspect Codex bridge binary attributes
  ansible.builtin.command:
    cmd: lsattr "{{ acp_codex_bridge_binary_path }}"
  register: acp_codex_bridge_binary_attrs
  changed_when: false
  failed_when: false
  check_mode: false

- name: Remove immutable flag from Codex bridge binary when present
  ansible.builtin.command:
    cmd: chattr -i "{{ acp_codex_bridge_binary_path }}"
  when:
    - ansible_os_family != 'Darwin'
    - "'i' in (acp_codex_bridge_binary_attrs.stdout | default(''))"
  changed_when: true
  become: true

- name: Upload XWorkmate Go ACP server binary
  ansible.builtin.copy:
    src: "{{ acp_codex_bridge_local_binary_path }}"
    dest: "{{ acp_codex_bridge_binary_path }}"
    owner: root
    group: root
    mode: "0755"
  become: true
  when: not (acp_codex_bridge_use_prebuilt | bool)

- name: Restore immutable flag on Codex bridge binary
  ansible.builtin.command:
    cmd: chattr +i "{{ acp_codex_bridge_binary_path }}"
  when:
    - ansible_os_family != 'Darwin'
    - "'i' in (acp_codex_bridge_binary_attrs.stdout | default(''))"
  changed_when: true
  become: true

- name: Remove deprecated standalone Codex Caddy fragments
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ acp_codex_obsolete_caddy_fragment_paths }}"
  notify: Reload caddy
  become: true
  when: acp_codex_manage_caddy | bool

- name: Deploy Caddy main file
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ acp_codex_caddyfile_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload caddy
  become: true
  when:
    - acp_codex_manage_caddy | bool

- name: Deploy Codex ACP systemd service
  ansible.builtin.command:
    cmd: lsattr "/etc/systemd/system/{{ acp_codex_service_name }}.service"
  register: acp_codex_service_attrs
  changed_when: false
  failed_when: false
  check_mode: false
  when: ansible_os_family != 'Darwin'

- name: Remove immutable flag from Codex ACP systemd service when present
  ansible.builtin.command:
    cmd: chattr -i "/etc/systemd/system/{{ acp_codex_service_name }}.service"
  when:
    - ansible_os_family != 'Darwin'
    - "'i' in (acp_codex_service_attrs.stdout | default(''))"
  changed_when: true
  become: true

- name: Deploy Codex ACP systemd service
  ansible.builtin.template:
    src: codex-app-server.service.j2
    dest: "/etc/systemd/system/{{ acp_codex_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart acp codex
  when: ansible_os_family != 'Darwin'

- name: Restore immutable flag on Codex ACP systemd service
  ansible.builtin.command:
    cmd: chattr +i "/etc/systemd/system/{{ acp_codex_service_name }}.service"
  when:
    - ansible_os_family != 'Darwin'
    - "'i' in (acp_codex_service_attrs.stdout | default(''))"
  changed_when: true
  become: true

- name: Reload systemd manager configuration
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_os_family != 'Darwin'

- name: Ensure Caddy is enabled and running
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
  when:
    - ansible_os_family != 'Darwin'
    - acp_codex_manage_caddy | bool

- name: Ensure Codex ACP service is enabled and running
  ansible.builtin.systemd:
    name: "{{ acp_codex_service_name }}"
    enabled: true
    state: started
  when:
    - not ansible_check_mode
    - ansible_os_family != 'Darwin'

- name: Import macOS specific Codex ACP tasks
  ansible.builtin.import_tasks: macos.yml
  when: ansible_os_family == 'Darwin'
