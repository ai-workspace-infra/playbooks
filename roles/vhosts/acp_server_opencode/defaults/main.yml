---
acp_opencode_service_name: acp-opencode
acp_opencode_runtime_user: "{{ ansible_env.USER | default('ubuntu') if ansible_os_family == 'Darwin' else 'ubuntu' }}"
acp_opencode_runtime_group: "{{ 'staff' if ansible_os_family == 'Darwin' else acp_opencode_runtime_user }}"
acp_opencode_runtime_home: "{{ ansible_env.HOME if ansible_os_family == 'Darwin' else '/home/' + acp_opencode_runtime_user }}"
acp_opencode_service_user: "{{ ansible_env.USER | default('ubuntu') if ansible_os_family == 'Darwin' else 'ubuntu' }}"
acp_opencode_service_group: "{{ 'staff' if ansible_os_family == 'Darwin' else acp_opencode_service_user }}"
acp_opencode_home: "{{ ansible_env.HOME if ansible_os_family == 'Darwin' else '/home/' + acp_opencode_service_user }}"
acp_opencode_workdir: "{{ acp_opencode_home }}/.opencode"
# PATH for the launchd/systemd service (mirrors gemini/codex). On macOS the
# user-level npm global bin lives under ~/.local/bin; include Homebrew + system.
acp_opencode_npm_global_bin: "{{ acp_opencode_home + '/.local/bin' if ansible_os_family == 'Darwin' else '/usr/bin' }}"
acp_opencode_path: "{{ acp_opencode_npm_global_bin }}:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin"
# OpenCode CLI binary the adapter spawns lazily (mirrors gemini/codex which use
# {{ acp_X_npm_global_bin }}/<cli>). Was hardcoded to /usr/bin/opencode in the
# unit template; use the resolved npm global bin so macOS (~/.local/bin) works too.
acp_opencode_binary_path: "{{ acp_opencode_npm_global_bin }}/opencode"
acp_opencode_listen_host: 127.0.0.1
acp_opencode_listen_port: 38992
acp_opencode_packages: []
acp_opencode_caddy_base_dir: "{{ '/opt/homebrew/etc/caddy' if ansible_os_family == 'Darwin' else '/etc/caddy' }}"
acp_opencode_caddy_conf_dir: "{{ acp_opencode_caddy_base_dir }}/conf.d"
acp_opencode_enable_ufw: false
acp_opencode_caddyfile_path: "{{ acp_opencode_caddy_base_dir }}/Caddyfile"
acp_opencode_manage_caddy: false
acp_opencode_bridge_service_name: xworkmate-bridge
acp_opencode_bridge_local_source_dir: "{{ playbook_dir }}/../xworkmate-bridge"
acp_opencode_bridge_local_build_dir: "{{ playbook_dir }}/.artifacts/acp_opencode"
acp_opencode_bridge_local_binary_path: "{{ acp_opencode_bridge_local_build_dir }}/xworkmate-go-core"
acp_opencode_bridge_build_goos: "{{ 'darwin' if ansible_os_family == 'Darwin' else 'linux' }}"
acp_opencode_bridge_build_goarch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"
acp_opencode_bridge_binary_path: /usr/local/bin/xworkmate-go-core
acp_opencode_bridge_use_prebuilt: "{{ lookup('ansible.builtin.env', 'AI_WORKSPACE_USE_PREBUILT_BRIDGE') | default('false', true) | bool }}"
acp_opencode_bridge_listen_host: 127.0.0.1
acp_opencode_bridge_listen_port: 8787
acp_opencode_bridge_allowed_origins:
  - https://xworkmate.svc.plus
  - http://localhost:*
  - http://127.0.0.1:*
acp_opencode_public_base_url: https://xworkmate-bridge.svc.plus/opencode
acp_opencode_auth_token: "{{ lookup('ansible.builtin.env', 'INTERNAL_SERVICE_TOKEN') | default('', true) }}"
acp_opencode_expected_body_marker: opencode-theme-id
acp_opencode_environment: {}
acp_opencode_obsolete_caddy_fragment_paths:
  - "{{ acp_opencode_caddy_base_dir }}/conf.d/acp-server-opencode.caddy"
  - "{{ acp_opencode_caddy_base_dir }}/conf.d/acp-server.caddy"
