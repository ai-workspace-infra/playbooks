---
- name: Ensure console service base directory exists
  ansible.builtin.file:
    path: "{{ console_service_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Assert console deploy uses prebuilt registry image
  ansible.builtin.assert:
    that:
      - console_service_frontend_image | trim | length > 0
      - "'/' in (console_service_frontend_image | trim)"
      - "':' in (console_service_frontend_image | trim)"
    fail_msg: >-
      CONSOLE deploy requires a prebuilt image reference via FRONTEND_IMAGE.
      This playbook only supports pull-only Docker Compose deployment on the target host
      and must never build images remotely.

- name: Log into container registry for console service
  ansible.builtin.shell: |
    set -euo pipefail
    printf '%s' '{{ console_service_registry_password }}' | docker login {{ console_service_registry }} -u '{{ console_service_registry_username }}' --password-stdin
  args:
    executable: /bin/bash
  no_log: true
  when:
    - console_service_registry_username | length > 0
    - console_service_registry_password | length > 0

- name: Render console compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ console_service_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render console runtime env file
  ansible.builtin.template:
    src: env.runtime.j2
    dest: "{{ console_service_runtime_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Validate console compose file
  ansible.builtin.command: >-
    docker compose
    --project-name {{ console_service_project_name }}
    -f {{ console_service_compose_file }}
    --env-file {{ console_service_runtime_env_file }}
    config
  args:
    chdir: "{{ console_service_base_dir }}"
  changed_when: false

- name: Pull console service images
  ansible.builtin.command: >-
    docker compose
    --project-name {{ console_service_project_name }}
    -f {{ console_service_compose_file }}
    --env-file {{ console_service_runtime_env_file }}
    pull dashboard frontend-assets
  args:
    chdir: "{{ console_service_base_dir }}"
  when: console_service_pull_images | bool

- name: Refresh console static assets volume
  ansible.builtin.command: >-
    docker compose
    --project-name {{ console_service_project_name }}
    -f {{ console_service_compose_file }}
    --env-file {{ console_service_runtime_env_file }}
    run --rm frontend-assets
  args:
    chdir: "{{ console_service_base_dir }}"

- name: Start console dashboard container
  ansible.builtin.command: >-
    docker compose
    --project-name {{ console_service_project_name }}
    -f {{ console_service_compose_file }}
    --env-file {{ console_service_runtime_env_file }}
    up -d --remove-orphans dashboard
  args:
    chdir: "{{ console_service_base_dir }}"

- name: Ensure Caddy fragment directory exists
  ansible.builtin.file:
    path: "{{ console_service_caddy_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: console_service_manage_caddy | bool
  become: true

- name: Render console proxy Caddy fragments
  ansible.builtin.template:
    src: console-site.caddy.j2
    dest: "{{ console_service_caddy_conf_dir }}/{{ item.domain }}.caddy"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ console_service_proxy_sites }}"
  loop_control:
    label: "{{ item.domain }}"
  register: console_service_proxy_fragments
  when: console_service_manage_caddy | bool
  become: true

- name: Render console redirect Caddy fragments
  ansible.builtin.template:
    src: console-redirect.caddy.j2
    dest: "{{ console_service_caddy_conf_dir }}/{{ item.source }}.caddy"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ console_service_redirect_rules }}"
  loop_control:
    label: "{{ item.source }} -> {{ item.target }}"
  register: console_service_redirect_fragments
  when:
    - console_service_manage_caddy | bool
    - console_service_redirect_rules | length > 0
  become: true

- name: Remove stale console alias Caddy fragment when alias is unset
  ansible.builtin.file:
    path: "{{ console_service_alias_caddy_fragment_path }}"
    state: absent
  when:
    - console_service_manage_caddy | bool
    - console_service_alias_domain | trim | length == 0
  become: true

- name: Validate Caddy config after updating console fragment
  ansible.builtin.command: caddy validate --config /etc/caddy/Caddyfile
  changed_when: false
  when:
    - console_service_manage_caddy | bool
    - not ansible_check_mode
    - >
      (console_service_proxy_fragments is changed)
      or (console_service_redirect_fragments is defined and console_service_redirect_fragments is changed)

- name: Reload Caddy after updating console fragment
  ansible.builtin.service:
    name: caddy
    state: reloaded
  when:
    - console_service_manage_caddy | bool
    - not ansible_check_mode
    - >
      (console_service_proxy_fragments is changed)
      or (console_service_redirect_fragments is defined and console_service_redirect_fragments is changed)
  become: true

- name: Show console compose status
  ansible.builtin.command: >-
    docker compose
    --project-name {{ console_service_project_name }}
    -f {{ console_service_compose_file }}
    --env-file {{ console_service_runtime_env_file }}
    ps
  args:
    chdir: "{{ console_service_base_dir }}"
  changed_when: false
