---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - not ansible_check_mode
    - ansible_os_family != 'Darwin'

- name: Restart openclaw gateway
  ansible.builtin.shell: |
    set -eu
    uid="{{ gateway_openclaw_effective_service_uid | default(gateway_openclaw_service_uid, true) }}"
    if [ -z "$uid" ]; then
      uid="$(id -u {{ gateway_openclaw_service_user }})"
    fi
    loginctl enable-linger {{ gateway_openclaw_service_user }} || true
    systemctl start "user@${uid}.service" || true
    runuser -u {{ gateway_openclaw_service_user }} -- env \
      HOME={{ gateway_openclaw_home | quote }} \
      XDG_RUNTIME_DIR="/run/user/${uid}" \
      DBUS_SESSION_BUS_ADDRESS="unix:path=/run/user/${uid}/bus" \
      systemctl --user restart {{ gateway_openclaw_service_name }}.service
  args:
    executable: /bin/bash
  become: true
  when:
    - not ansible_check_mode
    - ansible_os_family != 'Darwin'

- name: Restart openclaw on macOS
  ansible.builtin.command: "launchctl stop plus.svc.xworkspace.openclaw"
  register: launchctl_stop
  failed_when: false
  changed_when: false
  notify: Start openclaw on macOS

- name: Start openclaw on macOS
  ansible.builtin.command: "launchctl start plus.svc.xworkspace.openclaw"
  changed_when: false

- name: Reload caddy
  ansible.builtin.systemd:
    name: caddy
    state: reloaded
  when:
    - not ansible_check_mode
    - ansible_os_family != 'Darwin'
