---
- name: Ensure stunnel certificate directory exists
  ansible.builtin.file:
    path: "{{ stunnel_certs_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install stunnel certificate generation script
  ansible.builtin.template:
    src: stunnel-certs.sh.j2
    dest: "{{ stunnel_certs_script }}"
    owner: root
    group: root
    mode: "0700"

- name: Generate stunnel certificate material when absent
  ansible.builtin.command: "{{ stunnel_certs_script }}"
  args:
    creates: "{{ stunnel_certs_dir }}/server-cert.pem"
  no_log: true

- name: Enforce private key permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ stunnel_certs_dir }}/ca-key.pem", mode: "0600" }
    - { path: "{{ stunnel_certs_dir }}/server-key.pem", mode: "0600" }
    - { path: "{{ stunnel_certs_dir }}/ca-cert.pem", mode: "0644" }
    - { path: "{{ stunnel_certs_dir }}/server-cert.pem", mode: "0644" }
  when: not ansible_check_mode
