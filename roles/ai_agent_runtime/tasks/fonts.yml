---
- name: Install AI runtime font packages
  ansible.builtin.apt:
    name: "{{ ai_agent_runtime_font_packages }}"
    state: present
    update_cache: true
    install_recommends: false
    # 等 dpkg 前端锁，避免与 cloud-init/unattended-upgrades 抢锁而立即失败
    lock_timeout: "{{ ai_workspace_apt_lock_timeout | default(900) | int }}"
  environment:
    DEBIAN_FRONTEND: noninteractive
    APT_LISTCHANGES_FRONTEND: none
  become: true
  when: ansible_os_family != 'Darwin'

- name: Install fontconfig on macOS
  ansible.builtin.command: >-
    {{ '/opt/homebrew/bin/brew' if ansible_facts['architecture'] in ['arm64', 'aarch64'] else '/usr/local/bin/brew' }}
    install fontconfig
  register: ai_agent_runtime_fontconfig_install
  changed_when: "'already installed' not in (ai_agent_runtime_fontconfig_install.stdout | lower) and 'already installed' not in (ai_agent_runtime_fontconfig_install.stderr | lower)"
  failed_when: ai_agent_runtime_fontconfig_install.rc != 0 and 'already installed' not in (ai_agent_runtime_fontconfig_install.stdout | lower) and 'already installed' not in (ai_agent_runtime_fontconfig_install.stderr | lower)
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
    HOMEBREW_NO_INSTALL_CLEANUP: "1"
  when: ansible_os_family == 'Darwin'
