---
# ==============================================================================
# Write Database Passwords to Vault KV
# ==============================================================================

- name: Securely write database passwords to Vault
  hosts: all
  become: false
  gather_facts: false
  vars:
    vault_env_path: "{{ lookup('env', 'VAULT_ENV_PATH') | default('uat', true) }}"
    vault_deploy_mode: "{{ lookup('env', 'VAULT_DEPLOY_MODE') | default('standalone', true) }}"
    vault_addr: "{{ lookup('env', 'VAULT_ADDR') | default(('http://127.0.0.1:8200' if vault_deploy_mode != 'external' else 'https://vault.svc.plus'), true) }}"
    vault_token: "{{ lookup('env', 'VAULT_SERVER_ROOT_ACCESS_TOKEN') | default(lookup('env', 'VAULT_TOKEN'), true) }}"
  pre_tasks:
    - name: Include default DB configuration
      ansible.builtin.include_vars:
        file: roles/vhosts/postgres/defaults/main.yml

    - name: Include Vault configuration
      ansible.builtin.include_vars:
        file: roles/vhosts/vault/vars/main.yml

  tasks:
    - name: Debug vault token length and prefix
      debug:
        msg: "Token length: {{ vault_token | length }}, Prefix: {{ vault_token[:4] | default('none', true) }}, Env var 1: {{ lookup('env', 'VAULT_SERVER_ROOT_ACCESS_TOKEN') }}, Env var 2: {{ lookup('env', 'VAULT_TOKEN') }}"

    - name: Prepare Vault payload
      ansible.builtin.set_fact:
        db_vault_payload: "{{ dict((resolved_db_configs | from_yaml) | map(attribute='vault_key') | zip((resolved_db_configs | from_yaml) | map(attribute='password'))) }}"
      when: resolved_db_configs is defined

    - name: Securely write database passwords to Vault KV
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/kv/data/{{ vault_env_path }}/databases"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          data: "{{ db_vault_payload }}"
        status_code:
          - 200
          - 204
      when:
        - resolved_db_configs is defined
        - vault_token | length > 0
      run_once: true
      delegate_to: localhost
      no_log: false
